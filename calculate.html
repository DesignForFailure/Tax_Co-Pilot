{% extends "layouts/base.html" %}
{% block title %}Calculate{% endblock %}
{% block content %}
<h1 style="font-size: 24px; margin-bottom: 8px;">Run Calculation</h1>
<p class="text-dim text-sm mb-4">Enter W-2 data to compute your 2024 federal return.</p>

<form method="POST" action="/calculate">
    <div class="card">
        <h2>Filing Information</h2>
        <div class="form-row">
            <div>
                <label>Tax Year</label>
                <input type="number" name="tax_year" value="2024" readonly>
            </div>
            <div>
                <label>Filing Status</label>
                <select name="filing_status">
                    <option value="single">Single</option>
                    <option value="mfj" selected>Married Filing Jointly</option>
                    <option value="mfs">Married Filing Separately</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>👤 Primary Taxpayer — W-2</h2>
        <div class="form-row">
            <div>
                <label>First Name</label>
                <input type="text" name="p_first" value="" placeholder="First name" required>
            </div>
            <div>
                <label>Last Name</label>
                <input type="text" name="p_last" value="" placeholder="Last name" required>
            </div>
        </div>
        <div>
            <label>Employer Name</label>
            <input type="text" name="p_employer" value="" placeholder="Employer" required>
        </div>
        <div class="form-row">
            <div>
                <label>Wages (Box 1)</label>
                <input type="number" step="0.01" name="p_wages" value="" placeholder="0.00" required>
            </div>
            <div>
                <label>Federal Tax Withheld (Box 2)</label>
                <input type="number" step="0.01" name="p_withheld" value="" placeholder="0.00" required>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>💰 Capital Gains (1099-B) — Optional</h2>
        <div class="form-row-3">
            <div>
                <label>Description</label>
                <input type="text" name="cg_desc" value="" placeholder="e.g., BTC sale">
            </div>
            <div>
                <label>Proceeds</label>
                <input type="number" step="0.01" name="cg_proceeds" value="" placeholder="0.00">
            </div>
            <div>
                <label>Cost Basis</label>
                <input type="number" step="0.01" name="cg_basis" value="" placeholder="0.00">
            </div>
        </div>
    </div>

    <div class="flex gap-3 mt-4">
        <button type="submit">⚡ Calculate</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
