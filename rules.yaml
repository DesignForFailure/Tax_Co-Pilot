# Federal 2024 Tax Rules — MVP
# Sources: IRS Rev. Proc. 2023-34, 2024 Form 1040 Instructions

constants:
  standard_deduction:
    single: "14600"
    mfj: "29200"
    mfs: "14600"
    hoh: "21900"

rules:
  # ─── GROSS INCOME ───────────────────────────────────────────
  - id: "fed.2024.gross_income.wages"
    description: "Total wages, salaries, tips (Form 1040 Line 1a)"
    type: "sum"
    inputs:
      items: { ref: "input.w2.wages" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.interest"
    description: "Taxable interest income (Line 2b)"
    type: "sum"
    inputs:
      items: { ref: "input.1099int.amount" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.dividends"
    description: "Ordinary dividends (Line 3b)"
    type: "sum"
    inputs:
      items: { ref: "input.1099div.ordinary" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.capital_gains"
    description: "Net short-term + long-term capital gains (simplified)"
    type: "sum"
    inputs:
      items: { ref: "input.1099b.net_gain" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.total"
    description: "Total income (Line 9)"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.gross_income.wages" }
        - { ref: "fed.2024.gross_income.interest" }
        - { ref: "fed.2024.gross_income.dividends" }
        - { ref: "fed.2024.gross_income.capital_gains" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  # ─── AGI ────────────────────────────────────────────────────
  - id: "fed.2024.agi.total"
    description: "Adjusted Gross Income (Line 11). MVP: no above-the-line deductions."
    type: "formula"
    expression: "gross_income"
    inputs:
      gross_income: { ref: "fed.2024.gross_income.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  # ─── DEDUCTIONS ─────────────────────────────────────────────
  - id: "fed.2024.standard_deduction"
    description: "Standard deduction based on filing status"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  # ─── TAXABLE INCOME ─────────────────────────────────────────
  - id: "fed.2024.taxable_income"
    description: "Taxable income (Line 15) = AGI - deduction, min 0"
    type: "formula"
    expression: "max(agi - deduction, 0)"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      deduction: { ref: "fed.2024.standard_deduction" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  # ─── TAX BRACKETS ───────────────────────────────────────────
  - id: "fed.2024.tax.brackets"
    description: "2024 Federal income tax from brackets (Line 16)"
    type: "bracket_table"
    input: { ref: "fed.2024.taxable_income" }
    key: { ref: "input.filing_status" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
    tables:
      mfj:
        - { lower: 0,       upper: 23200,   rate: "0.10" }
        - { lower: 23200,   upper: 94300,   rate: "0.12" }
        - { lower: 94300,   upper: 201050,  rate: "0.22" }
        - { lower: 201050,  upper: 383900,  rate: "0.24" }
        - { lower: 383900,  upper: 487450,  rate: "0.32" }
        - { lower: 487450,  upper: 731200,  rate: "0.35" }
        - { lower: 731200,  upper: null,    rate: "0.37" }
      single:
        - { lower: 0,       upper: 11600,   rate: "0.10" }
        - { lower: 11600,   upper: 47150,   rate: "0.12" }
        - { lower: 47150,   upper: 100525,  rate: "0.22" }
        - { lower: 100525,  upper: 191950,  rate: "0.24" }
        - { lower: 191950,  upper: 243725,  rate: "0.32" }
        - { lower: 243725,  upper: 609350,  rate: "0.35" }
        - { lower: 609350,  upper: null,    rate: "0.37" }
      mfs:
        - { lower: 0,       upper: 11600,   rate: "0.10" }
        - { lower: 11600,   upper: 47150,   rate: "0.12" }
        - { lower: 47150,   upper: 100525,  rate: "0.22" }
        - { lower: 100525,  upper: 191950,  rate: "0.24" }
        - { lower: 191950,  upper: 243725,  rate: "0.32" }
        - { lower: 243725,  upper: 365600,  rate: "0.35" }
        - { lower: 365600,  upper: null,    rate: "0.37" }

  # ─── WITHHOLDING & RESULT ───────────────────────────────────
  - id: "fed.2024.total_withholding"
    description: "Total federal tax withheld"
    type: "sum"
    inputs:
      items: { ref: "input.withholding.federal" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.refund_or_owed"
    description: "Refund (positive) or amount owed (negative)"
    type: "formula"
    expression: "withholding - tax"
    inputs:
      withholding: { ref: "fed.2024.total_withholding" }
      tax: { ref: "fed.2024.tax.brackets" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
