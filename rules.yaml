# Georgia 2024 Income Tax Rules
# Source: Georgia Department of Revenue, HB 1015 transition rates
# Note: Georgia is transitioning to a flat rate. For 2024, the rate is 5.39% flat
# on Georgia taxable income (after GA standard deduction and personal exemptions).
# GA standard deduction differs from federal.

constants:
  standard_deduction:
    single: "5400"
    mfj: "7100"
    mfs: "3550"
    hoh: "5400"
  personal_exemption:
    single: "2700"
    mfj: "7400"     # $2700 each + $3000 each dependent (0 deps in MVP)
    mfs: "2700"
    hoh: "2700"

rules:
  - id: "ga.2024.agi"
    description: "Georgia AGI (starts from federal AGI)"
    type: "formula"
    expression: "federal_agi"
    inputs:
      federal_agi: { ref: "input.state.ga.agi" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ga.2024.standard_deduction"
    description: "Georgia standard deduction"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "ga.2024.personal_exemption"
    description: "Georgia personal exemption"
    type: "lookup"
    table: "constants.personal_exemption"
    key: { ref: "input.filing_status" }

  - id: "ga.2024.taxable_income"
    description: "Georgia taxable income = AGI - standard deduction - personal exemption"
    type: "formula"
    expression: "max(agi - deduction - exemption, 0)"
    inputs:
      agi: { ref: "ga.2024.agi" }
      deduction: { ref: "ga.2024.standard_deduction" }
      exemption: { ref: "ga.2024.personal_exemption" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2024.tax"
    description: "Georgia income tax (2024 flat rate 5.39%)"
    type: "formula"
    expression: "taxable_income * rate"
    inputs:
      taxable_income: { ref: "ga.2024.taxable_income" }
      rate: { literal: "0.0539" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2024.withholding"
    description: "Total Georgia tax withheld"
    type: "sum"
    inputs:
      items: { ref: "input.state.ga.withholding" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ga.2024.refund_or_owed"
    description: "Georgia refund (positive) or amount owed (negative)"
    type: "formula"
    expression: "withholding - tax"
    inputs:
      withholding: { ref: "ga.2024.withholding" }
      tax: { ref: "ga.2024.tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
