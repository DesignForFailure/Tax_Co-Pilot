<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Copilot — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242834;
            --border: #2e3345;
            --text: #e4e6f0;
            --text-dim: #8b8fa3;
            --accent: #6c8cff;
            --accent-dim: #4a65c0;
            --green: #4ade80;
            --red: #f87171;
            --orange: #fbbf24;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
            position: sticky; top: 0; z-index: 100;
        }
        nav .container { display: flex; align-items: center; gap: 32px; }
        nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 14px; transition: color 0.15s; }
        nav a:hover { color: var(--text); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
        .card h3 { font-size: 15px; margin-bottom: 12px; color: var(--text-dim); }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .summary-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }
        .summary-item .label { font-size: 12px; color: var(--text-dim); }
        .summary-item .value { font-size: 20px; font-weight: 700; margin-top: 6px; }
        .positive { color: var(--green); }
        .negative { color: var(--red); }
        .text-dim { color: var(--text-dim); }
        .text-sm { font-size: 13px; }
        .mb-4 { margin-bottom: 16px; }

        label { display:block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            outline: none;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.06s, background 0.15s;
        }
        .btn:hover { background: var(--accent-dim); }
        .btn:active { transform: translateY(1px); }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
        }
        .btn-danger {
            background: var(--red);
        }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .btn-outline:hover { background: var(--accent); color: white; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .dynamic-section { margin-bottom: 16px; }
        .dynamic-row {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 10px;
            position: relative;
        }
        .dynamic-row .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
        }
        .dynamic-row .remove-btn:hover { background: var(--red); color: white; }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .checkbox-row input[type="checkbox"] { width: auto; }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .section-header h3 { margin-bottom: 0; }
        .spouse-section { display: none; }
        .spouse-section.visible { display: block; }
        a { color: var(--accent); }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">Tax Copilot</div>
            <a href="/">Dashboard</a>
            <a href="/calculate">Calculate</a>
            <a href="/runs">Runs</a>
        </div>
    </nav>
    <main class="container" style="padding: 24px 0 60px;">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
