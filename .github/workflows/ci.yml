# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  ENABLE_TEST_ARTIFACTS: "true"
  ENABLE_COVERAGE: "true"

jobs:
  quality:
    name: Quality checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev

      - name: Install runtime and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy .

      - name: Validate rule packs
        run: |
          for dir in rule_packs/federal/*/ rule_packs/state/*/*/; do
            python scripts/validate_rule_pack.py "$dir"
          done

      - name: Pytest (with optional coverage)
        run: |
          mkdir -p test-results
          if [ "${ENABLE_COVERAGE}" = "true" ]; then
            pytest --junitxml=test-results/junit.xml --cov=app --cov-report=xml:test-results/coverage.xml
          else
            pytest --junitxml=test-results/junit.xml
          fi

      - name: pip-audit
        run: pip-audit --desc

      - name: Upload test results/coverage artifact
        if: always() && env.ENABLE_TEST_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results/
          if-no-files-found: warn
