constants:
  capital_loss_limit:
    single: "-3000"
    mfj: "-3000"
    mfs: "-1500"
    hoh: "-3000"
    qss: "-3000"
  ltcg_threshold_0:
    single: "44625"
    mfj: "89250"
    mfs: "44625"
    hoh: "59750"
    qss: "89250"
  ltcg_threshold_15:
    single: "492300"
    mfj: "553850"
    mfs: "276900"
    hoh: "523050"
    qss: "553850"
  education_phaseout:
    lower:
      single: "80000"
      mfj: "160000"
      mfs: "80000"
      hoh: "80000"
      qss: "80000"
    upper:
      single: "90000"
      mfj: "180000"
      mfs: "90000"
      hoh: "90000"
      qss: "90000"
  education_eligible:
    single: "1"
    mfj: "1"
    mfs: "0"
    hoh: "1"
    qss: "1"
  standard_deduction:
    single: "13850"
    mfj: "27700"
    mfs: "13850"
    hoh: "20800"
    qss: "27700"

  ss_taxability:
    base_threshold:
      single: "25000"
      mfj: "32000"
      mfs: "0"
      hoh: "25000"
      qss: "32000"
    upper_threshold:
      single: "34000"
      mfj: "44000"
      mfs: "0"
      hoh: "34000"
      qss: "44000"

  adjustment_limits:
    student_loan_interest_max: "2500"
    educator_expenses_max: "300"
    ira_limit: "6500"
    hsa_limit:
      single: "3850"
      mfj: "7750"
      mfs: "3850"
      hoh: "3850"
      qss: "7750"

  itemized_limits:
    salt_cap:
      single: "10000"
      mfj: "10000"
      mfs: "5000"
      hoh: "10000"
      qss: "10000"

  ctc_phaseout_threshold:
    single: "200000"
    mfj: "400000"
    mfs: "200000"
    hoh: "200000"
    qss: "400000"

rules:
  - id: "fed.2023.gross_income.wages"
    description: "Total W-2 wages (Box 1)"
    form_line: "1040 Line 1a"
    type: "sum"
    inputs:
      items: { ref: "input.w2.wages" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.interest"
    description: "Total taxable interest (1099-INT)"
    form_line: "1040 Line 2b"
    type: "sum"
    inputs:
      items: { ref: "input.1099int.amount" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.dividends"
    description: "Total ordinary dividends (1099-DIV Box 1a)"
    form_line: "1040 Line 3b"
    type: "sum"
    inputs:
      items: { ref: "input.1099div.ordinary" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.capital_gains"
    description: "Net capital gains (1099-B proceeds - basis)"
    form_line: "Schedule D"
    type: "sum"
    inputs:
      items: { ref: "input.1099b.net_gain" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.self_employment"
    description: "Total self-employment income (1099-NEC Box 1)"
    form_line: "Schedule 1 Line 3"
    type: "sum"
    inputs:
      items: { ref: "input.1099nec.compensation" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.capital_loss_limit"
    description: "Capital loss deduction limit (IRC 1211(b): -$1,500 for MFS)"
    form_line: "1040 Line 7"
    type: "lookup"
    table: "constants.capital_loss_limit"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.gross_income.capital_gains_limited"
    description: "Net capital gains after loss limitation (-$3,000; -$1,500 MFS)"
    form_line: "1040 Line 7"
    type: "formula"
    expression: "max(gains, neg_limit)"
    inputs:
      gains: { ref: "fed.2023.gross_income.capital_gains" }
      neg_limit: { ref: "fed.2023.gross_income.capital_loss_limit" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.other"
    description: "Other income (Line 8 catch-all)"
    form_line: "Schedule 1 Line 8"
    type: "formula"
    expression: "other"
    inputs:
      other: { ref: "input.other_income" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.ss_half_benefits"
    description: "50% of total Social Security benefits"
    form_line: "SS Worksheet Line 2"
    type: "formula"
    expression: "benefits * half"
    inputs:
      benefits: { ref: "input.ssa.total_benefits" }
      half: { literal: "0.5" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.ss_base_threshold"
    description: "SS taxability base threshold by filing status"
    form_line: "SS Worksheet"
    type: "lookup"
    table: "constants.ss_taxability.base_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.gross_income.ss_upper_threshold"
    description: "SS taxability upper threshold by filing status"
    form_line: "SS Worksheet"
    type: "lookup"
    table: "constants.ss_taxability.upper_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.gross_income.ss_max_taxable"
    description: "85% of total SS benefits (maximum taxable amount)"
    form_line: "SS Worksheet Line 4"
    type: "formula"
    expression: "benefits * rate"
    inputs:
      benefits: { ref: "input.ssa.total_benefits" }
      rate: { literal: "0.85" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.ss_provisional"
    description: "Provisional income for SS taxability (Pub 915 WS1 Line 8: non-SS income incl. tax-exempt interest + 50% benefits - adjustments other than student loan interest)"
    form_line: "SS Worksheet Line 6"
    type: "formula"
    expression: "wages + interest + tax_exempt + dividends + gains + se + other + half_ss - educator - hsa - ira - se_tax"
    inputs:
      wages: { ref: "fed.2023.gross_income.wages" }
      interest: { ref: "fed.2023.gross_income.interest" }
      tax_exempt: { ref: "input.1099int.tax_exempt" }
      dividends: { ref: "fed.2023.gross_income.dividends" }
      gains: { ref: "fed.2023.gross_income.capital_gains_limited" }
      se: { ref: "fed.2023.gross_income.self_employment" }
      other: { ref: "fed.2023.gross_income.other" }
      half_ss: { ref: "fed.2023.gross_income.ss_half_benefits" }
      educator: { ref: "fed.2023.adjustments.educator" }
      hsa: { ref: "fed.2023.adjustments.hsa" }
      ira: { ref: "fed.2023.adjustments.ira" }
      se_tax: { ref: "fed.2023.adjustments.se_tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.ss_lower_calc"
    description: "SS taxability lower-tier amount (50% of provisional above base, capped at 50% of benefits)"
    form_line: "SS Worksheet Line 10"
    type: "formula"
    expression: "max(min((prov - base) * rate, (upper - base) * rate, half_ss), zero)"
    inputs:
      prov: { ref: "fed.2023.gross_income.ss_provisional" }
      base: { ref: "fed.2023.gross_income.ss_base_threshold" }
      upper: { ref: "fed.2023.gross_income.ss_upper_threshold" }
      rate: { literal: "0.50" }
      half_ss: { ref: "fed.2023.gross_income.ss_half_benefits" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.ss_upper_calc"
    description: "SS taxability upper-tier amount (85% of provisional above upper threshold)"
    form_line: "SS Worksheet Line 14"
    type: "formula"
    expression: "max((prov - upper) * rate, zero)"
    inputs:
      prov: { ref: "fed.2023.gross_income.ss_provisional" }
      upper: { ref: "fed.2023.gross_income.ss_upper_threshold" }
      rate: { literal: "0.85" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.social_security"
    description: "Taxable Social Security benefits"
    form_line: "1040 Line 6b"
    type: "formula"
    expression: "min(max_taxable, lower + upper)"
    inputs:
      max_taxable: { ref: "fed.2023.gross_income.ss_max_taxable" }
      lower: { ref: "fed.2023.gross_income.ss_lower_calc" }
      upper: { ref: "fed.2023.gross_income.ss_upper_calc" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.gross_income.total"
    description: "Total income (all sources)"
    form_line: "1040 Line 9"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2023.gross_income.wages" }
        - { ref: "fed.2023.gross_income.interest" }
        - { ref: "fed.2023.gross_income.dividends" }
        - { ref: "fed.2023.gross_income.capital_gains_limited" }
        - { ref: "fed.2023.gross_income.self_employment" }
        - { ref: "fed.2023.gross_income.social_security" }
        - { ref: "fed.2023.gross_income.other" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.adjustments.hsa_limit"
    description: "HSA contribution limit by filing status"
    form_line: "Form 8889"
    type: "lookup"
    table: "constants.adjustment_limits.hsa_limit"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.adjustments.student_loan"
    description: "Student loan interest deduction (capped at $2,500)"
    form_line: "Schedule 1 Line 21"
    type: "formula"
    expression: "min(input, cap)"
    inputs:
      input: { ref: "input.adjustments.student_loan_interest" }
      cap: { literal: "2500" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.adjustments.educator"
    description: "Educator expenses deduction (capped at $300)"
    form_line: "Schedule 1 Line 11"
    type: "formula"
    expression: "min(input, cap)"
    inputs:
      input: { ref: "input.adjustments.educator_expenses" }
      cap: { literal: "300" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.adjustments.hsa"
    description: "HSA deduction (capped by filing status)"
    form_line: "Schedule 1 Line 13"
    type: "formula"
    expression: "min(input, limit)"
    inputs:
      input: { ref: "input.adjustments.hsa_contributions" }
      limit: { ref: "fed.2023.adjustments.hsa_limit" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.adjustments.ira"
    description: "IRA deduction (capped at $6,500)"
    form_line: "Schedule 1 Line 20"
    type: "formula"
    expression: "min(input, cap)"
    inputs:
      input: { ref: "input.adjustments.ira_contributions" }
      cap: { literal: "6500" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.adjustments.se_tax"
    description: "SE tax deduction: calculated employer-equivalent half when 1099-NEC income exists, else the manual input"
    form_line: "Schedule 1 Line 15"
    type: "formula"
    expression: "calc * gate + manual * (one - gate)"
    inputs:
      calc: { ref: "fed.2023.se.deduction" }
      gate: { ref: "fed.2023.se.has_nec" }
      manual: { ref: "input.adjustments.self_employment_tax_deduction" }
      one: { literal: "1" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.adjustments.total"
    description: "Total above-the-line adjustments"
    form_line: "Schedule 1 Line 26"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2023.adjustments.student_loan" }
        - { ref: "fed.2023.adjustments.educator" }
        - { ref: "fed.2023.adjustments.hsa" }
        - { ref: "fed.2023.adjustments.ira" }
        - { ref: "fed.2023.adjustments.se_tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.agi.total"
    description: "Adjusted gross income (gross income minus adjustments)"
    form_line: "1040 Line 11"
    type: "formula"
    expression: "max(gross - adj, zero)"
    inputs:
      gross: { ref: "fed.2023.gross_income.total" }
      adj: { ref: "fed.2023.adjustments.total" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.standard_deduction"
    description: "Standard deduction for 2023"
    form_line: "1040 Line 13"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.itemized.salt_cap"
    description: "SALT deduction cap by filing status"
    form_line: "Schedule A"
    type: "lookup"
    table: "constants.itemized_limits.salt_cap"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.itemized.salt_total"
    description: "State/local taxes + property taxes, capped at SALT limit"
    form_line: "Schedule A Line 7"
    type: "formula"
    expression: "min(state_taxes + property_taxes, cap)"
    inputs:
      state_taxes: { ref: "input.itemized.state_local_taxes" }
      property_taxes: { ref: "input.itemized.real_estate_taxes" }
      cap: { ref: "fed.2023.itemized.salt_cap" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.itemized.medical_floor"
    description: "7.5% of AGI floor for medical deduction"
    form_line: "Schedule A Line 3"
    type: "formula"
    expression: "agi * rate"
    inputs:
      agi: { ref: "fed.2023.agi.total" }
      rate: { literal: "0.075" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.itemized.medical"
    description: "Medical deduction (expenses above 7.5% AGI floor)"
    form_line: "Schedule A Line 4"
    type: "formula"
    expression: "max(expenses - floor, zero)"
    inputs:
      expenses: { ref: "input.itemized.medical_expenses" }
      floor: { ref: "fed.2023.itemized.medical_floor" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.itemized.mortgage_interest"
    description: "Home mortgage interest deduction"
    form_line: "Schedule A Line 10"
    type: "formula"
    expression: "input"
    inputs:
      input: { ref: "input.itemized.mortgage_interest" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.itemized.charitable_agi_cap"
    description: "60% of AGI cap for cash charitable contributions"
    form_line: "Schedule A"
    type: "formula"
    expression: "agi * rate"
    inputs:
      agi: { ref: "fed.2023.agi.total" }
      rate: { literal: "0.60" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.itemized.charitable_noncash_agi_cap"
    description: "30% of AGI cap for noncash charitable contributions"
    form_line: "Schedule A"
    type: "formula"
    expression: "agi * rate"
    inputs:
      agi: { ref: "fed.2023.agi.total" }
      rate: { literal: "0.30" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.itemized.charitable"
    description: "Charitable contributions (cash capped at 60% AGI, noncash at 30% AGI)"
    form_line: "Schedule A Line 14"
    type: "formula"
    expression: "min(cash, agi_cap) + min(noncash, noncash_cap)"
    inputs:
      cash: { ref: "input.itemized.charitable_cash" }
      noncash: { ref: "input.itemized.charitable_noncash" }
      agi_cap: { ref: "fed.2023.itemized.charitable_agi_cap" }
      noncash_cap: { ref: "fed.2023.itemized.charitable_noncash_agi_cap" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.itemized.total"
    description: "Total itemized deductions (Schedule A Line 17)"
    form_line: "Schedule A Line 17"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2023.itemized.medical" }
        - { ref: "fed.2023.itemized.salt_total" }
        - { ref: "fed.2023.itemized.mortgage_interest" }
        - { ref: "fed.2023.itemized.charitable" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.deductions.applied"
    description: "Greater of standard or itemized deduction"
    form_line: "1040 Line 12"
    type: "formula"
    expression: "max(standard, itemized)"
    inputs:
      standard: { ref: "fed.2023.standard_deduction" }
      itemized: { ref: "fed.2023.itemized.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.taxable_income"
    description: "Taxable income = max(AGI - applied deduction, 0)"
    form_line: "1040 Line 15"
    type: "formula"
    expression: "max(agi - deduction, 0)"
    inputs:
      agi: { ref: "fed.2023.agi.total" }
      deduction: { ref: "fed.2023.deductions.applied" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.tax.brackets"
    description: "Tax on all taxable income at ordinary rates (QDCGT Worksheet comparison figure)"
    form_line: "QDCGT Worksheet Line 24"
    type: "bracket_table"
    input: { ref: "fed.2023.taxable_income" }
    key: { ref: "input.filing_status" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
    tables:
      single:
        - { lower: "0", upper: "11000", rate: "0.10" }
        - { lower: "11000", upper: "44725", rate: "0.12" }
        - { lower: "44725", upper: "95375", rate: "0.22" }
        - { lower: "95375", upper: "182100", rate: "0.24" }
        - { lower: "182100", upper: "231250", rate: "0.32" }
        - { lower: "231250", upper: "578125", rate: "0.35" }
        - { lower: "578125", upper: null, rate: "0.37" }
      mfj:
        - { lower: "0", upper: "22000", rate: "0.10" }
        - { lower: "22000", upper: "89450", rate: "0.12" }
        - { lower: "89450", upper: "190750", rate: "0.22" }
        - { lower: "190750", upper: "364200", rate: "0.24" }
        - { lower: "364200", upper: "462500", rate: "0.32" }
        - { lower: "462500", upper: "693750", rate: "0.35" }
        - { lower: "693750", upper: null, rate: "0.37" }
      mfs:
        - { lower: "0", upper: "11000", rate: "0.10" }
        - { lower: "11000", upper: "44725", rate: "0.12" }
        - { lower: "44725", upper: "95375", rate: "0.22" }
        - { lower: "95375", upper: "182100", rate: "0.24" }
        - { lower: "182100", upper: "231250", rate: "0.32" }
        - { lower: "231250", upper: "346875", rate: "0.35" }
        - { lower: "346875", upper: null, rate: "0.37" }
      hoh:
        - { lower: "0", upper: "15700", rate: "0.10" }
        - { lower: "15700", upper: "59850", rate: "0.12" }
        - { lower: "59850", upper: "95350", rate: "0.22" }
        - { lower: "95350", upper: "182100", rate: "0.24" }
        - { lower: "182100", upper: "231250", rate: "0.32" }
        - { lower: "231250", upper: "578100", rate: "0.35" }
        - { lower: "578100", upper: null, rate: "0.37" }
      qss:
        - { lower: "0", upper: "22000", rate: "0.10" }
        - { lower: "22000", upper: "89450", rate: "0.12" }
        - { lower: "89450", upper: "190750", rate: "0.22" }
        - { lower: "190750", upper: "364200", rate: "0.24" }
        - { lower: "364200", upper: "462500", rate: "0.32" }
        - { lower: "462500", upper: "693750", rate: "0.35" }
        - { lower: "693750", upper: null, rate: "0.37" }

  - id: "fed.2023.income.long_term_gains"
    description: "Net long-term capital gain or loss (1099-B long-term lots)"
    form_line: "Schedule D Line 15"
    type: "sum"
    inputs:
      items: { ref: "input.1099b.long_term_gain" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.income.short_term_gains"
    description: "Net short-term capital gain or loss (1099-B short-term lots)"
    form_line: "Schedule D Line 7"
    type: "sum"
    inputs:
      items: { ref: "input.1099b.short_term_gain" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.income.net_capital_gain"
    description: "Net capital gain eligible for preferential rates (smaller of Schedule D lines 15 and 16, not below zero)"
    form_line: "Schedule D Line 16"
    type: "formula"
    expression: "max(min(lt, lt + st), 0)"
    inputs:
      lt: { ref: "fed.2023.income.long_term_gains" }
      st: { ref: "fed.2023.income.short_term_gains" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.income.preferential"
    description: "Preferential-rate income: qualified dividends + net capital gain, capped at taxable income"
    form_line: "QDCGT Worksheet Line 6"
    type: "formula"
    expression: "min(qualified + net_gain, taxable)"
    inputs:
      qualified: { ref: "input.1099div.qualified" }
      net_gain: { ref: "fed.2023.income.net_capital_gain" }
      taxable: { ref: "fed.2023.taxable_income" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.income.ordinary"
    description: "Taxable income taxed at ordinary rates (taxable income minus preferential income)"
    form_line: "QDCGT Worksheet Line 7"
    type: "formula"
    expression: "taxable - preferential"
    inputs:
      taxable: { ref: "fed.2023.taxable_income" }
      preferential: { ref: "fed.2023.income.preferential" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.ltcg.threshold_0"
    description: "Top of the 0% long-term capital gains bracket by filing status"
    form_line: "QDCGT Worksheet Line 9"
    type: "lookup"
    table: "constants.ltcg_threshold_0"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.ltcg.threshold_15"
    description: "Top of the 15% long-term capital gains bracket by filing status"
    form_line: "QDCGT Worksheet Line 15"
    type: "lookup"
    table: "constants.ltcg_threshold_15"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.tax.ordinary"
    description: "Ordinary-rate tax on non-preferential income using 2023 bracket tables"
    form_line: "QDCGT Worksheet Line 22"
    type: "bracket_table"
    input: { ref: "fed.2023.income.ordinary" }
    key: { ref: "input.filing_status" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
    tables:
      single:
        - { lower: "0", upper: "11000", rate: "0.10" }
        - { lower: "11000", upper: "44725", rate: "0.12" }
        - { lower: "44725", upper: "95375", rate: "0.22" }
        - { lower: "95375", upper: "182100", rate: "0.24" }
        - { lower: "182100", upper: "231250", rate: "0.32" }
        - { lower: "231250", upper: "578125", rate: "0.35" }
        - { lower: "578125", upper: null, rate: "0.37" }
      mfj:
        - { lower: "0", upper: "22000", rate: "0.10" }
        - { lower: "22000", upper: "89450", rate: "0.12" }
        - { lower: "89450", upper: "190750", rate: "0.22" }
        - { lower: "190750", upper: "364200", rate: "0.24" }
        - { lower: "364200", upper: "462500", rate: "0.32" }
        - { lower: "462500", upper: "693750", rate: "0.35" }
        - { lower: "693750", upper: null, rate: "0.37" }
      mfs:
        - { lower: "0", upper: "11000", rate: "0.10" }
        - { lower: "11000", upper: "44725", rate: "0.12" }
        - { lower: "44725", upper: "95375", rate: "0.22" }
        - { lower: "95375", upper: "182100", rate: "0.24" }
        - { lower: "182100", upper: "231250", rate: "0.32" }
        - { lower: "231250", upper: "346875", rate: "0.35" }
        - { lower: "346875", upper: null, rate: "0.37" }
      hoh:
        - { lower: "0", upper: "15700", rate: "0.10" }
        - { lower: "15700", upper: "59850", rate: "0.12" }
        - { lower: "59850", upper: "95350", rate: "0.22" }
        - { lower: "95350", upper: "182100", rate: "0.24" }
        - { lower: "182100", upper: "231250", rate: "0.32" }
        - { lower: "231250", upper: "578100", rate: "0.35" }
        - { lower: "578100", upper: null, rate: "0.37" }
      qss:
        - { lower: "0", upper: "22000", rate: "0.10" }
        - { lower: "22000", upper: "89450", rate: "0.12" }
        - { lower: "89450", upper: "190750", rate: "0.22" }
        - { lower: "190750", upper: "364200", rate: "0.24" }
        - { lower: "364200", upper: "462500", rate: "0.32" }
        - { lower: "462500", upper: "693750", rate: "0.35" }
        - { lower: "693750", upper: null, rate: "0.37" }

  - id: "fed.2023.tax.ltcg"
    description: "Tax on preferential income at 0%/15%/20% rates, stacked on top of ordinary income"
    form_line: "QDCGT Worksheet Lines 18-21"
    type: "formula"
    expression: "(min(pref, max(t15 - ordinary, 0)) - min(pref, max(t0 - ordinary, 0))) * r15 + (pref - min(pref, max(t15 - ordinary, 0))) * r20"
    inputs:
      pref: { ref: "fed.2023.income.preferential" }
      ordinary: { ref: "fed.2023.income.ordinary" }
      t0: { ref: "fed.2023.ltcg.threshold_0" }
      t15: { ref: "fed.2023.ltcg.threshold_15" }
      r15: { literal: "0.15" }
      r20: { literal: "0.20" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.tax.total_before_credits"
    description: "Tax before credits: smaller of stacked ordinary+LTCG tax or all-ordinary bracket tax (QDCGT Worksheet Line 25)"
    form_line: "1040 Line 16"
    type: "formula"
    expression: "min(ordinary_tax + ltcg_tax, all_ordinary_tax)"
    inputs:
      ordinary_tax: { ref: "fed.2023.tax.ordinary" }
      ltcg_tax: { ref: "fed.2023.tax.ltcg" }
      all_ordinary_tax: { ref: "fed.2023.tax.brackets" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.credits.ctc.base"
    description: "Child tax credit base amount ($2,000 per qualifying child)"
    form_line: "1040 Line 19"
    type: "formula"
    expression: "children * credit"
    inputs:
      children: { ref: "input.qualifying_children" }
      credit: { literal: "2000" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.credits.ctc.threshold"
    description: "CTC phaseout AGI threshold by filing status"
    form_line: "CTC Worksheet"
    type: "lookup"
    table: "constants.ctc_phaseout_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2023.credits.ctc.phaseout_units"
    description: "AGI excess over CTC threshold in $1,000 units, rounded up to the next whole unit (Form 8812)"
    form_line: "CTC Worksheet"
    type: "formula"
    expression: "max((agi - threshold) / thousand, zero)"
    inputs:
      agi: { ref: "fed.2023.agi.total" }
      threshold: { ref: "fed.2023.credits.ctc.threshold" }
      thousand: { literal: "1000" }
      zero: { literal: "0" }
    rounding: "ROUND_UP"
    rounding_precision: 0

  - id: "fed.2023.credits.ctc.phaseout"
    description: "CTC phaseout reduction ($50 per $1,000 or fraction thereof of AGI over threshold)"
    form_line: "CTC Worksheet"
    type: "formula"
    expression: "units * fifty"
    inputs:
      units: { ref: "fed.2023.credits.ctc.phaseout_units" }
      fifty: { literal: "50" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.credits.ctc.final"
    description: "Child tax credit after phaseout"
    form_line: "1040 Line 19"
    type: "formula"
    expression: "max(base - phaseout, zero)"
    inputs:
      base: { ref: "fed.2023.credits.ctc.base" }
      phaseout: { ref: "fed.2023.credits.ctc.phaseout" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.credits.total"
    description: "Total nonrefundable credits"
    form_line: "1040 Line 21"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2023.credits.ctc.final" }
        - { ref: "fed.2023.credits.edu.aotc_nonrefundable" }
        - { ref: "fed.2023.credits.edu.llc" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.credits.eic.num_children"
    description: "Qualifying children for EIC, capped at 3 (parameters do not grow past three)"
    form_line: "Schedule EIC"
    type: "formula"
    expression: "min(kids, cap)"
    inputs:
      kids: { ref: "input.qualifying_children" }
      cap: { literal: "3" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2023.credits.eic.earned_income"
    description: "Earned income for EIC: wages plus SE net profit minus the half-SE-tax deduction (Pub 596 Worksheet B)"
    form_line: "EIC Worksheet Line 1"
    type: "formula"
    expression: "max(wages + nec - se_ded, 0)"
    inputs:
      wages: { ref: "fed.2023.gross_income.wages" }
      nec: { ref: "fed.2023.gross_income.self_employment" }
      se_ded: { ref: "fed.2023.se.deduction" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2023.credits.eic.max_credit"
    description: "EIC maximum credit by filing status and qualifying children (MFS ineligible)"
    form_line: "EIC Parameters"
    type: "matrix_lookup"
    keys:
