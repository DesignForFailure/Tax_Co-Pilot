  - id: "fed.2023.credits.eic.phase_out_start"
    description: "AGI/earned income where the EIC phaseout begins (higher for MFJ)"
    form_line: "EIC Parameters"
    type: "matrix_lookup"
    keys:
      - "input.filing_status"
      - { ref: "fed.2023.credits.eic.num_children" }
