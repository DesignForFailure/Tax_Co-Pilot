  # =========================================================================
  # CREDITS
  # =========================================================================

  - id: "fed.2025.tax.ltcg"
    description: "Tax on preferential income at 0%/15%/20% rates, stacked on top of ordinary income"
    form_line: "QDCGT Worksheet Lines 18-21"
    type: "formula"
    expression: "(min(pref, max(t15 - ordinary, 0)) - min(pref, max(t0 - ordinary, 0))) * r15 + (pref - min(pref, max(t15 - ordinary, 0))) * r20"
    inputs:
      pref: { ref: "fed.2025.income.preferential" }
      ordinary: { ref: "fed.2025.income.ordinary" }
      t0: { ref: "fed.2025.ltcg.threshold_0" }
      t15: { ref: "fed.2025.ltcg.threshold_15" }
      r15: { literal: "0.15" }
      r20: { literal: "0.20" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2025.tax.total_before_credits"
    description: "Tax before credits: smaller of stacked ordinary+LTCG tax or all-ordinary bracket tax (QDCGT Worksheet Line 25)"
    form_line: "1040 Line 16"
    type: "formula"
    expression: "min(ordinary_tax + ltcg_tax, all_ordinary_tax)"
    inputs:
      ordinary_tax: { ref: "fed.2025.tax.ordinary" }
      ltcg_tax: { ref: "fed.2025.tax.ltcg" }
      all_ordinary_tax: { ref: "fed.2025.tax.brackets" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2025.credits.ctc.base"
    description: "Child tax credit base amount ($2,200 per qualifying child, OBBBA)"
    form_line: "1040 Line 19"
    type: "formula"
    expression: "children * credit"
    inputs:
      children: { ref: "input.qualifying_children" }
      credit: { literal: "2200" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2025.credits.ctc.threshold"
    description: "CTC phaseout AGI threshold by filing status"
    form_line: "CTC Worksheet"
    type: "lookup"
    table: "constants.ctc_phaseout_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2025.credits.ctc.phaseout_units"
    description: "AGI excess over CTC threshold in $1,000 units, rounded up to the next whole unit (Form 8812)"
    form_line: "CTC Worksheet"
    type: "formula"
    expression: "max((agi - threshold) / thousand, zero)"
    inputs:
      agi: { ref: "fed.2025.agi.total" }
      threshold: { ref: "fed.2025.credits.ctc.threshold" }
      thousand: { literal: "1000" }
      zero: { literal: "0" }
    rounding: "ROUND_UP"
    rounding_precision: 0

  - id: "fed.2025.credits.ctc.phaseout"
    description: "CTC phaseout reduction ($50 per $1,000 or fraction thereof of AGI over threshold)"
    form_line: "CTC Worksheet"
    type: "formula"
    expression: "units * fifty"
    inputs:
      units: { ref: "fed.2025.credits.ctc.phaseout_units" }
      fifty: { literal: "50" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2025.credits.ctc.final"
    description: "Child tax credit after phaseout"
    form_line: "1040 Line 19"
    type: "formula"
    expression: "max(base - phaseout, zero)"
    inputs:
      base: { ref: "fed.2025.credits.ctc.base" }
      phaseout: { ref: "fed.2025.credits.ctc.phaseout" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2025.credits.total"
    description: "Total nonrefundable credits"
    form_line: "1040 Line 21"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2025.credits.ctc.final" }
        - { ref: "fed.2025.credits.edu.aotc_nonrefundable" }
        - { ref: "fed.2025.credits.edu.llc" }
        - { ref: "fed.2025.credits.care.final" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

