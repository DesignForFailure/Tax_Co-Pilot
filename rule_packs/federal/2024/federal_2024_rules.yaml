  - id: "fed.2024.credits.eic.phase_in_amount"
    description: "EIC phase-in amount (earned income times credit rate, capped at the maximum credit)"
    form_line: "EIC Worksheet"
    type: "formula"
    expression: "min(earned * rate, max_credit)"
    inputs:
      earned: { ref: "fed.2024.credits.eic.earned_income" }
      rate: { ref: "fed.2024.credits.eic.phase_in_rate" }
      max_credit: { ref: "fed.2024.credits.eic.max_credit" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.eic.phase_out_amount"
    description: "EIC phaseout: reduction based on the greater of AGI or earned income above the threshold"
    form_line: "EIC Worksheet"
    type: "formula"
    expression: "max((max(agi, earned) - start) * rate, 0)"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      earned: { ref: "fed.2024.credits.eic.earned_income" }
      start: { ref: "fed.2024.credits.eic.phase_out_start" }
      rate: { ref: "fed.2024.credits.eic.phase_out_rate" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.eic.tentative"
    description: "Tentative EIC before the investment income test"
    form_line: "EIC Worksheet"
    type: "formula"
    expression: "max(phase_in - phase_out, 0)"
    inputs:
      phase_in: { ref: "fed.2024.credits.eic.phase_in_amount" }
      phase_out: { ref: "fed.2024.credits.eic.phase_out_amount" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.eic.earned_income_elected"
    description: "EIC earned income under the combat pay election: nontaxable combat pay (W-2 Box 12 Q) added to earned income, all-or-nothing per IRC 32(c)(2)(B)(vi)"
    form_line: "EIC Worksheet (combat pay election)"
    type: "formula"
    expression: "earned + combat_pay"
    inputs:
      earned: { ref: "fed.2024.credits.eic.earned_income" }
      combat_pay: { ref: "input.military.combat_pay" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.eic.phase_in_elected"
    description: "EIC phase-in amount under the combat pay election"
    form_line: "EIC Worksheet (combat pay election)"
    type: "formula"
    expression: "min(earned * rate, max_credit)"
    inputs:
      earned: { ref: "fed.2024.credits.eic.earned_income_elected" }
      rate: { ref: "fed.2024.credits.eic.phase_in_rate" }
      max_credit: { ref: "fed.2024.credits.eic.max_credit" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.eic.phase_out_elected"
    description: "EIC phaseout under the combat pay election (elected earned income also enters the greater-of comparison with AGI)"
    form_line: "EIC Worksheet (combat pay election)"
    type: "formula"
    expression: "max((max(agi, earned) - start) * rate, 0)"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      earned: { ref: "fed.2024.credits.eic.earned_income_elected" }
      start: { ref: "fed.2024.credits.eic.phase_out_start" }
      rate: { ref: "fed.2024.credits.eic.phase_out_rate" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.eic.tentative_elected"
    description: "Tentative EIC under the combat pay election, before the investment income test"
    form_line: "EIC Worksheet (combat pay election)"
    type: "formula"
    expression: "max(phase_in - phase_out, 0)"
    inputs:
      phase_in: { ref: "fed.2024.credits.eic.phase_in_elected" }
      phase_out: { ref: "fed.2024.credits.eic.phase_out_elected" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.eic.investment_income"
    description: "Investment income for the EIC limit: taxable + tax-exempt interest, dividends, and net capital gain (not below zero)"
    form_line: "Pub 596 Worksheet 1"
    type: "formula"
    expression: "interest + tax_exempt + dividends + max(gains, 0)"
    inputs:
      interest: { ref: "fed.2024.gross_income.interest" }
      tax_exempt: { ref: "input.1099int.tax_exempt" }
      dividends: { ref: "fed.2024.gross_income.dividends" }
      gains: { ref: "fed.2024.gross_income.capital_gains" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.eic.eligible"
    description: "Investment income test (2024 limit $11600): 1 when at or under the limit, else 0"
    form_line: "Pub 596 Rule 6"
    type: "formula"
    expression: "one - min(max((inv - limit) * mult, 0), one)"
    inputs:
      inv: { ref: "fed.2024.credits.eic.investment_income" }
      limit: { literal: "11600.005" }
      mult: { literal: "1000" }
      one: { literal: "1" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.eic.final"
    description: "Earned income credit (refundable; reported with payments). Takes the better of the base credit or the combat pay election (IRC 32(c)(2)(B)(vi)); the trace records both tentative amounts"
    form_line: "1040 Line 27"
    type: "formula"
    expression: "max(tentative, tentative_elected) * eligible"
    inputs:
      tentative: { ref: "fed.2024.credits.eic.tentative" }
      tentative_elected: { ref: "fed.2024.credits.eic.tentative_elected" }
      eligible: { ref: "fed.2024.credits.eic.eligible" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.edu.phaseout_lower"
    description: "Education credit MAGI phaseout floor (IRC 25A(d): fixed since 2021)"
    form_line: "Form 8863"
    type: "lookup"
    table: "constants.education_phaseout.lower"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.credits.edu.phaseout_upper"
    description: "Education credit MAGI phaseout ceiling"
    form_line: "Form 8863"
    type: "lookup"
    table: "constants.education_phaseout.upper"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.credits.edu.eligible"
    description: "Education credit eligibility: MFS filers are barred (IRC 25A(g)(6))"
    form_line: "Form 8863"
    type: "lookup"
    table: "constants.education_eligible"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.credits.edu.ratio"
    description: "MAGI phaseout ratio (Form 8863 lines 2-6; AGI used as MAGI — foreign exclusions unmodeled)"
    form_line: "Form 8863 Line 6"
    type: "formula"
    expression: "min(max((upper - agi) / (upper - lower), 0), one) * eligible"
    inputs:
      upper: { ref: "fed.2024.credits.edu.phaseout_upper" }
      lower: { ref: "fed.2024.credits.edu.phaseout_lower" }
      agi: { ref: "fed.2024.agi.total" }
      one: { literal: "1" }
      eligible: { ref: "fed.2024.credits.edu.eligible" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 3

  - id: "fed.2024.credits.edu.aotc_tentative"
    description: "Tentative American Opportunity Credit: 100% of first $2,000 + 25% of next $2,000 per student"
    form_line: "Form 8863 Line 1"
    type: "formula"
    expression: "tier1 + quarter * (tier2 - tier1)"
    inputs:
      tier1: { ref: "input.education.aotc_tier1" }
      tier2: { ref: "input.education.aotc_tier2" }
      quarter: { literal: "0.25" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.edu.aotc"
    description: "American Opportunity Credit after MAGI phaseout"
    form_line: "Form 8863 Line 7"
    type: "formula"
    expression: "tentative * ratio"
    inputs:
      tentative: { ref: "fed.2024.credits.edu.aotc_tentative" }
      ratio: { ref: "fed.2024.credits.edu.ratio" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.edu.aotc_refundable"
    description: "Refundable 40% of the AOTC (paid out even with zero tax)"
    form_line: "1040 Line 29"
    type: "formula"
    expression: "aotc * rate"
    inputs:
      aotc: { ref: "fed.2024.credits.edu.aotc" }
      rate: { literal: "0.40" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.edu.aotc_nonrefundable"
    description: "Nonrefundable 60% of the AOTC (joins the credit total)"
    form_line: "Form 8863 Line 9"
    type: "formula"
    expression: "aotc - refundable"
    inputs:
      aotc: { ref: "fed.2024.credits.edu.aotc" }
      refundable: { ref: "fed.2024.credits.edu.aotc_refundable" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.edu.llc_tentative"
    description: "Tentative Lifetime Learning Credit: 20% of up to $10,000 expenses per return"
    form_line: "Form 8863 Line 11"
    type: "formula"
    expression: "min(expenses, cap) * rate"
    inputs:
      expenses: { ref: "input.education.llc_expenses" }
      cap: { literal: "10000" }
      rate: { literal: "0.20" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.edu.llc"
    description: "Lifetime Learning Credit after MAGI phaseout (nonrefundable)"
    form_line: "Form 8863 Line 19"
    type: "formula"
    expression: "tentative * ratio"
    inputs:
      tentative: { ref: "fed.2024.credits.edu.llc_tentative" }
      ratio: { ref: "fed.2024.credits.edu.ratio" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.care.spouse_required"
    description: "1 for MFJ (both spouses' earned income limits Form 2441), else 0"
    form_line: "Form 2441"
    type: "lookup"
    table: "constants.care_spouse_required"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.credits.care.persons_capped"
    description: "Qualifying persons for dependent care, capped at 2 (expense limit does not grow past two)"
    form_line: "Form 2441 Line 2"
    type: "formula"
    expression: "min(persons, cap)"
    inputs:
      persons: { ref: "input.care.qualifying_persons" }
      cap: { literal: "2" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.care.dollar_cap"
    description: "Care expense dollar limit: $3,000 for one qualifying person, $6,000 for two or more"
    form_line: "Form 2441 Line 3"
    type: "formula"
    expression: "persons * per_person"
    inputs:
      persons: { ref: "fed.2024.credits.care.persons_capped" }
      per_person: { literal: "3000" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.care.earned_cap"
    description: "Earned income limit: taxpayer's earned income; for MFJ the smaller of the two spouses' (a no-income spouse zeroes the credit)"
    form_line: "Form 2441 Lines 4-5"
    type: "formula"
    expression: "primary * (one - mfj) + min(primary, spouse) * mfj"
    inputs:
      primary: { ref: "input.earned_income.primary" }
      spouse: { ref: "input.earned_income.spouse" }
      mfj: { ref: "fed.2024.credits.care.spouse_required" }
      one: { literal: "1" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.care.eligible_expenses"
    description: "Care expenses limited by the dollar cap and the earned income cap"
    form_line: "Form 2441 Line 6"
    type: "formula"
    expression: "max(min(expenses, dollar_cap, earned_cap), 0)"
    inputs:
      expenses: { ref: "input.care.expenses" }
      dollar_cap: { ref: "fed.2024.credits.care.dollar_cap" }
      earned_cap: { ref: "fed.2024.credits.care.earned_cap" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.care.agi_steps"
    description: "AGI steps of $2,000 (or fraction) above $15,000, rounded up (Form 2441 rate table)"
    form_line: "Form 2441 Line 8"
    type: "formula"
    expression: "max((agi - base) / step, 0)"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      base: { literal: "15000" }
      step: { literal: "2000" }
    rounding: "ROUND_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.care.rate"
    description: "Applicable percentage: 35% minus 1% per step, floored at 20% (AGI over $43,000)"
    form_line: "Form 2441 Line 8"
    type: "formula"
    expression: "max(top - steps * point, floor)"
    inputs:
      top: { literal: "0.35" }
      steps: { ref: "fed.2024.credits.care.agi_steps" }
      point: { literal: "0.01" }
      floor: { literal: "0.20" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.care.final"
    description: "Credit for child and dependent care expenses (nonrefundable)"
    form_line: "Form 2441 Line 9"
    type: "formula"
    expression: "expenses * rate"
    inputs:
      expenses: { ref: "fed.2024.credits.care.eligible_expenses" }
      rate: { ref: "fed.2024.credits.care.rate" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.niit.threshold"
    description: "NIIT MAGI threshold (IRC 1411(b): statutory, not inflation-indexed)"
    form_line: "Form 8960 Line 14"
    type: "lookup"
    table: "constants.niit_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.niit.investment_income"
    description: "Net investment income: taxable interest + dividends + net capital gain as included in income, not below zero (tax-exempt interest excluded)"
    form_line: "Form 8960 Line 8"
    type: "formula"
    expression: "max(interest + dividends + gains, 0)"
    inputs:
      interest: { ref: "fed.2024.gross_income.interest" }
      dividends: { ref: "fed.2024.gross_income.dividends" }
      gains: { ref: "fed.2024.gross_income.capital_gains_limited" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.niit.magi_excess"
    description: "MAGI above the NIIT threshold (AGI used as MAGI — foreign exclusions unmodeled)"
    form_line: "Form 8960 Line 15"
    type: "formula"
    expression: "max(agi - threshold, 0)"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      threshold: { ref: "fed.2024.niit.threshold" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.niit.final"
    description: "Net investment income tax: 3.8% of the smaller of net investment income or the MAGI excess"
    form_line: "Form 8960 Line 17"
    type: "formula"
    expression: "min(nii, excess) * rate"
    inputs:
      nii: { ref: "fed.2024.niit.investment_income" }
      excess: { ref: "fed.2024.niit.magi_excess" }
      rate: { literal: "0.038" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  # Additional Medicare Tax (M27, Form 8959; M29 wired W-2 Box 5/6 in,
  # including Part IV surtax withholding). RRTA compensation unmodeled.
  - id: "fed.2024.addl_medicare.threshold"
    description: "Additional Medicare Tax threshold (IRC 3101(b)(2): $200k single/HoH, $250k MFJ/QSS, $125k MFS; statutory, not indexed)"
    form_line: "Form 8959"
    type: "lookup"
    table: "constants.additional_medicare_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.addl_medicare.wage_excess"
    description: "Medicare wages above the threshold (Form 8959 Line 6; W-2 Box 5, falling back to Box 1 per W-2 when Box 5 is blank)"
    form_line: "Form 8959 Line 6"
    type: "formula"
    expression: "max(wages - threshold, 0)"
    inputs:
      wages: { ref: "input.w2.medicare_wages" }
      threshold: { ref: "fed.2024.addl_medicare.threshold" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.addl_medicare.se_threshold"
    description: "Threshold remaining for SE income: the filing-status threshold reduced (not below zero) by Medicare wages (Form 8959 Line 12)"
    form_line: "Form 8959 Line 12"
    type: "formula"
    expression: "max(threshold - wages, 0)"
    inputs:
      threshold: { ref: "fed.2024.addl_medicare.threshold" }
      wages: { ref: "input.w2.medicare_wages" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.addl_medicare.se_excess"
    description: "SE net earnings (Schedule SE Line 6, zero below the $400 floor) above the remaining threshold (Form 8959 Line 13 base)"
    form_line: "Form 8959 Line 13"
    type: "formula"
    expression: "max(se_earnings - se_threshold, 0)"
    inputs:
      se_earnings: { ref: "fed.2024.se.net_earnings" }
      se_threshold: { ref: "fed.2024.addl_medicare.se_threshold" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.addl_medicare.final"
    description: "Additional Medicare Tax: 0.9% of wage and SE income above the thresholds (RRTA compensation unmodeled)"
    form_line: "Form 8959 Line 18"
    type: "formula"
    expression: "(wage_excess + se_excess) * rate"
    inputs:
      wage_excess: { ref: "fed.2024.addl_medicare.wage_excess" }
      se_excess: { ref: "fed.2024.addl_medicare.se_excess" }
      rate: { literal: "0.009" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.tax.other_taxes"
    description: "Other taxes from Schedule 2: self-employment tax + net investment income tax + Additional Medicare Tax"
    form_line: "1040 Line 23"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.se.total" }
        - { ref: "fed.2024.niit.final" }
        - { ref: "fed.2024.addl_medicare.final" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.tax.after_credits"
    description: "Federal tax after credits (cannot go below zero)"
    form_line: "1040 Line 22"
    type: "formula"
    expression: "max(tax - credits, zero)"
    inputs:
      tax: { ref: "fed.2024.tax.total_before_credits" }
      credits: { ref: "fed.2024.credits.total" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.se.has_nec"
    description: "1 when any 1099-NEC self-employment income exists, else 0 (gates the SE deduction override)"
    form_line: "Schedule SE"
    type: "formula"
    expression: "min(max(nec * mult, 0), one)"
    inputs:
      nec: { ref: "input.1099nec.compensation" }
      mult: { literal: "1000" }
      one: { literal: "1" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.se.net_earnings_raw"
    description: "Net earnings from self-employment (92.35% of 1099-NEC income)"
    form_line: "Schedule SE Line 4a"
    type: "formula"
    expression: "nec * factor"
    inputs:
      nec: { ref: "input.1099nec.compensation" }
      factor: { literal: "0.9235" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.se.applies"
    description: "SE tax $400 net-earnings floor (IRC 1402(b)(2)): 1 when net earnings reach $400, else 0. The 399.995 cutoff with a x1000 step puts the switch between representable cent values."
    form_line: "Schedule SE Line 4c"
    type: "formula"
    expression: "min(max((net - cutoff) * mult, 0), one)"
    inputs:
      net: { ref: "fed.2024.se.net_earnings_raw" }
      cutoff: { literal: "399.995" }
      mult: { literal: "1000" }
      one: { literal: "1" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.se.net_earnings"
    description: "Net SE earnings subject to SE tax (zero below the $400 floor)"
    form_line: "Schedule SE Line 6"
    type: "formula"
    expression: "raw * gate"
    inputs:
      raw: { ref: "fed.2024.se.net_earnings_raw" }
      gate: { ref: "fed.2024.se.applies" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.se.ss_taxable"
    description: "SE earnings subject to Social Security (2024 wage base $168600 reduced by W-2 wages)"
    form_line: "Schedule SE Lines 8-9"
    type: "formula"
    expression: "max(min(net, base - wages), 0)"
    inputs:
      net: { ref: "fed.2024.se.net_earnings" }
      base: { literal: "168600" }
      wages: { ref: "input.w2.wages" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.se.ss_tax"
    description: "Social Security portion of SE tax (12.4%)"
    form_line: "Schedule SE Line 10"
    type: "formula"
    expression: "ss_taxable * rate"
    inputs:
      ss_taxable: { ref: "fed.2024.se.ss_taxable" }
      rate: { literal: "0.124" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.se.medicare_tax"
    description: "Medicare portion of SE tax (2.9%, no wage cap)"
    form_line: "Schedule SE Line 11"
    type: "formula"
    expression: "net * rate"
    inputs:
      net: { ref: "fed.2024.se.net_earnings" }
      rate: { literal: "0.029" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.se.total"
    description: "Total self-employment tax (Schedule SE Line 12, reported via Schedule 2 Line 4)"
    form_line: "Schedule 2 Line 4"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.se.ss_tax" }
        - { ref: "fed.2024.se.medicare_tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.se.deduction"
    description: "Deduction for one-half of SE tax (employer-equivalent portion)"
    form_line: "Schedule SE Line 13"
    type: "formula"
    expression: "total * half"
    inputs:
      total: { ref: "fed.2024.se.total" }
      half: { literal: "0.5" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.tax.total_liability"
    description: "Total tax: income tax after credits plus self-employment tax"
    form_line: "1040 Line 24"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.tax.after_credits" }
        - { ref: "fed.2024.tax.other_taxes" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.addl_medicare.regular_withholding"
    description: "Regular Medicare tax on Medicare wages: 1.45% of W-2 Box 5 (Form 8959 Line 20)"
    form_line: "Form 8959 Line 20"
    type: "formula"
    expression: "wages * rate"
    inputs:
      wages: { ref: "input.w2.medicare_wages" }
      rate: { literal: "0.0145" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.addl_medicare.withholding"
    description: "Additional Medicare Tax withheld by employers: Box 6 in excess of 1.45% of Box 5 (Form 8959 Line 22; credited on 1040 line 25c)"
    form_line: "Form 8959 Line 22"
    type: "formula"
    expression: "max(withheld - regular, 0)"
    inputs:
      withheld: { ref: "input.w2.medicare_withheld" }
      regular: { ref: "fed.2024.addl_medicare.regular_withholding" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.total_withholding"
    description: "Total federal withholding (Box 2 income tax plus Form 8959 Part IV Additional Medicare Tax withholding)"
    form_line: "1040 Line 25d"
    type: "sum"
    inputs:
      items:
        - { ref: "input.withholding.federal" }
        - { ref: "fed.2024.addl_medicare.withholding" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.estimated_payments"
    description: "Estimated tax payments made during the year"
    form_line: "1040 Line 26"
    type: "sum"
    inputs:
      items: { ref: "input.estimated_payments" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.total_payments"
    description: "Total payments (withholding + estimated + refundable EIC)"
    form_line: "1040 Line 33"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.total_withholding" }
        - { ref: "fed.2024.estimated_payments" }
        - { ref: "fed.2024.credits.eic.final" }
        - { ref: "fed.2024.credits.actc.final" }
        - { ref: "fed.2024.credits.edu.aotc_refundable" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.refund_or_owed"
    description: "Refund (positive) or amount owed (negative)"
    form_line: "1040 Line 34/37"
    type: "formula"
    expression: "payments - tax"
    inputs:
      payments: { ref: "fed.2024.total_payments" }
      tax: { ref: "fed.2024.tax.total_liability" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
