constants:
  capital_loss_limit:
    single: "-3000"
    mfj: "-3000"
    mfs: "-1500"
    hoh: "-3000"
    qss: "-3000"
  ltcg_threshold_0:
    single: "47025"
    mfj: "94050"
    mfs: "47025"
    hoh: "63000"
    qss: "94050"
  ltcg_threshold_15:
    single: "518900"
    mfj: "583750"
    mfs: "291850"
    hoh: "551350"
    qss: "583750"
  education_phaseout:
    lower:
      single: "80000"
      mfj: "160000"
      mfs: "80000"
      hoh: "80000"
      qss: "80000"
    upper:
      single: "90000"
      mfj: "180000"
      mfs: "90000"
      hoh: "90000"
      qss: "90000"
  education_eligible:
    single: "1"
    mfj: "1"
    mfs: "0"
    hoh: "1"
    qss: "1"
  care_spouse_required:
    single: "0"
    mfj: "1"
    mfs: "0"
    hoh: "0"
    qss: "0"
  niit_threshold:
    single: "200000"
    mfj: "250000"
    mfs: "125000"
    hoh: "200000"
    qss: "250000"
  standard_deduction:
    single: "14600"
    mfj: "29200"
    mfs: "14600"
    hoh: "21900"
    qss: "29200"

  ss_taxability:
    base_threshold:
      single: "25000"
      mfj: "32000"
      mfs: "0"
      hoh: "25000"
      qss: "32000"
    upper_threshold:
      single: "34000"
      mfj: "44000"
      mfs: "0"
      hoh: "34000"
      qss: "44000"

  adjustment_limits:
    hsa_limit:
      single: "4150"
      mfj: "8300"
      mfs: "4150"
      hoh: "4150"
      qss: "8300"

  itemized_limits:
    salt_cap:
      single: "10000"
      mfj: "10000"
      mfs: "5000"
      hoh: "10000"
      qss: "10000"

  ctc_phaseout_threshold:
    single: "200000"
    mfj: "400000"
    mfs: "200000"
    hoh: "200000"
    qss: "400000"

  additional_standard_deduction:
    single: "1950"
    mfj: "1550"
    mfs: "1550"
    hoh: "1950"
    qss: "1550"

  # IRC 3101(b)(2) Additional Medicare Tax thresholds - statutory,
  # deliberately identical across years (not inflation-indexed).
  additional_medicare_threshold:
    single: "200000"
    mfj: "250000"
    mfs: "125000"
    hoh: "200000"
    qss: "250000"

rules:
  - id: "fed.2024.gross_income.wages"
    description: "Total W-2 wages (Box 1)"
    form_line: "1040 Line 1a"
    type: "sum"
    inputs:
      items: { ref: "input.w2.wages" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.interest"
    description: "Total taxable interest (1099-INT)"
    form_line: "1040 Line 2b"
    type: "sum"
    inputs:
      items: { ref: "input.1099int.amount" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.dividends"
    description: "Total ordinary dividends (1099-DIV Box 1a)"
    form_line: "1040 Line 3b"
    type: "sum"
    inputs:
      items: { ref: "input.1099div.ordinary" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.capital_gains"
    description: "Net capital gains (1099-B proceeds - basis)"
    form_line: "Schedule D"
    type: "sum"
    inputs:
      items: { ref: "input.1099b.net_gain" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.self_employment"
    description: "Total self-employment income (1099-NEC Box 1)"
    form_line: "Schedule 1 Line 3"
    type: "sum"
    inputs:
      items: { ref: "input.1099nec.compensation" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.capital_loss_limit"
    description: "Capital loss deduction limit (IRC 1211(b): -$1,500 for MFS)"
    form_line: "Schedule D Loss Limit"
    type: "lookup"
    table: "constants.capital_loss_limit"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.gross_income.capital_gains_limited"
    description: "Net capital gains after loss limitation (-$3,000; -$1,500 MFS)"
    form_line: "1040 Line 7"
    type: "formula"
    expression: "max(gains, neg_limit)"
    inputs:
      gains: { ref: "fed.2024.gross_income.capital_gains" }
      neg_limit: { ref: "fed.2024.gross_income.capital_loss_limit" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.other"
    description: "Other income (Line 8 catch-all)"
    form_line: "Schedule 1 Line 8"
    type: "formula"
    expression: "other"
    inputs:
      other: { ref: "input.other_income" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.ss_half_benefits"
    description: "50% of total Social Security benefits"
    form_line: "SS Worksheet Line 2"
    type: "formula"
    expression: "benefits * half"
    inputs:
      benefits: { ref: "input.ssa.total_benefits" }
      half: { literal: "0.5" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.ss_base_threshold"
    description: "SS taxability base threshold by filing status"
    form_line: "SS Worksheet"
    type: "lookup"
    table: "constants.ss_taxability.base_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.gross_income.ss_upper_threshold"
    description: "SS taxability upper threshold by filing status"
    form_line: "SS Worksheet"
    type: "lookup"
    table: "constants.ss_taxability.upper_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.gross_income.ss_max_taxable"
    description: "85% of total SS benefits (maximum taxable amount)"
    form_line: "SS Worksheet Line 4"
    type: "formula"
    expression: "benefits * rate"
    inputs:
      benefits: { ref: "input.ssa.total_benefits" }
      rate: { literal: "0.85" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.ss_provisional"
    description: "Provisional income for SS taxability (Pub 915 WS1 Line 8: non-SS income incl. tax-exempt interest + 50% benefits - adjustments other than student loan interest)"
    form_line: "SS Worksheet Line 6"
    type: "formula"
    expression: "wages + interest + tax_exempt + dividends + gains + se + other + half_ss - educator - hsa - ira - se_tax"
    inputs:
      wages: { ref: "fed.2024.gross_income.wages" }
      interest: { ref: "fed.2024.gross_income.interest" }
      tax_exempt: { ref: "input.1099int.tax_exempt" }
      dividends: { ref: "fed.2024.gross_income.dividends" }
      gains: { ref: "fed.2024.gross_income.capital_gains_limited" }
      se: { ref: "fed.2024.gross_income.self_employment" }
      other: { ref: "fed.2024.gross_income.other" }
      half_ss: { ref: "fed.2024.gross_income.ss_half_benefits" }
      educator: { ref: "fed.2024.adjustments.educator" }
      hsa: { ref: "fed.2024.adjustments.hsa" }
      ira: { ref: "fed.2024.adjustments.ira" }
      se_tax: { ref: "fed.2024.adjustments.se_tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.ss_lower_calc"
    description: "SS taxability lower-tier amount (50% of provisional above base, capped at 50% of benefits)"
    form_line: "SS Worksheet Line 10"
    type: "formula"
    expression: "max(min((prov - base) * rate, (upper - base) * rate, half_ss), zero)"
    inputs:
      prov: { ref: "fed.2024.gross_income.ss_provisional" }
      base: { ref: "fed.2024.gross_income.ss_base_threshold" }
      upper: { ref: "fed.2024.gross_income.ss_upper_threshold" }
      rate: { literal: "0.50" }
      half_ss: { ref: "fed.2024.gross_income.ss_half_benefits" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.ss_upper_calc"
    description: "SS taxability upper-tier amount (85% of provisional above upper threshold)"
    form_line: "SS Worksheet Line 14"
    type: "formula"
    expression: "max((prov - upper) * rate, zero)"
    inputs:
      prov: { ref: "fed.2024.gross_income.ss_provisional" }
      upper: { ref: "fed.2024.gross_income.ss_upper_threshold" }
      rate: { literal: "0.85" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.social_security"
    description: "Taxable Social Security benefits"
    form_line: "1040 Line 6b"
    type: "formula"
    expression: "min(max_taxable, lower + upper)"
    inputs:
      max_taxable: { ref: "fed.2024.gross_income.ss_max_taxable" }
      lower: { ref: "fed.2024.gross_income.ss_lower_calc" }
      upper: { ref: "fed.2024.gross_income.ss_upper_calc" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.gross_income.total"
    description: "Total income (all sources)"
    form_line: "1040 Line 9"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.gross_income.wages" }
        - { ref: "fed.2024.gross_income.interest" }
        - { ref: "fed.2024.gross_income.dividends" }
        - { ref: "fed.2024.gross_income.capital_gains_limited" }
        - { ref: "fed.2024.gross_income.self_employment" }
        - { ref: "fed.2024.gross_income.social_security" }
        - { ref: "fed.2024.gross_income.other" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.adjustments.hsa_limit"
    description: "HSA contribution limit by filing status"
    form_line: "Form 8889"
    type: "lookup"
    table: "constants.adjustment_limits.hsa_limit"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.adjustments.student_loan"
    description: "Student loan interest deduction (capped at $2,500)"
    form_line: "Schedule 1 Line 21"
    type: "formula"
    expression: "min(input, cap)"
    inputs:
      input: { ref: "input.adjustments.student_loan_interest" }
      cap: { literal: "2500" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.adjustments.educator"
    description: "Educator expenses deduction (capped at $300)"
    form_line: "Schedule 1 Line 11"
    type: "formula"
    expression: "min(input, cap)"
    inputs:
      input: { ref: "input.adjustments.educator_expenses" }
      cap: { literal: "300" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.adjustments.hsa"
    description: "HSA deduction (capped by filing status)"
    form_line: "Schedule 1 Line 13"
    type: "formula"
    expression: "min(input, limit)"
    inputs:
      input: { ref: "input.adjustments.hsa_contributions" }
      limit: { ref: "fed.2024.adjustments.hsa_limit" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.adjustments.ira"
    description: "IRA deduction (capped at $7,000)"
    form_line: "Schedule 1 Line 20"
    type: "formula"
    expression: "min(input, cap)"
    inputs:
      input: { ref: "input.adjustments.ira_contributions" }
      cap: { literal: "7000" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.adjustments.se_tax"
    description: "SE tax deduction: calculated employer-equivalent half when 1099-NEC income exists, else the manual input"
    form_line: "Schedule 1 Line 15"
    type: "formula"
    expression: "calc * gate + manual * (one - gate)"
    inputs:
      calc: { ref: "fed.2024.se.deduction" }
      gate: { ref: "fed.2024.se.has_nec" }
      manual: { ref: "input.adjustments.self_employment_tax_deduction" }
      one: { literal: "1" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  # Military service (M24). Combat pay arrives via W-2 Box 12 code Q and is
  # already excluded from Box 1 wages by the employer; the engine records it
  # in the trace without re-subtracting it. Out of scope (documented):
  # IRC 7508 deadline extensions, veterans' disability compensation, and
  # state military pay exemptions / SCRA residency rules.
  - id: "fed.2024.military.combat_pay_exclusion"
    description: "Combat zone pay excluded from federal wages (IRC 112; W-2 Box 12 code Q). Informational: the amount is already absent from Box 1 wages and is never re-subtracted"
    form_line: "W-2 Box 12 Q"
    type: "formula"
    expression: "combat_pay"
    inputs:
      combat_pay: { ref: "input.military.combat_pay" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.military.officer_cap"
    description: "Commissioned officer exclusion ceiling: monthly cap times qualifying months (IRC 112(b) for 2024: $10,294.80 highest enlisted basic pay plus $225 hostile fire/imminent danger pay = 10519.80/month)"
    form_line: "Pub 3 officer limit"
    type: "formula"
    expression: "monthly_cap * months"
    inputs:
      monthly_cap: { literal: "10519.80" }
      months: { ref: "input.military.officer_combat_months" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.military.officer_excess"
    description: "Warning trace: amount by which a commissioned officer's reported Box 12 Q exceeds the IRC 112(b) ceiling. Any excess is taxable and should already appear in Box 1 wages - verify the W-2 when nonzero"
    form_line: "Pub 3 officer limit"
    type: "formula"
    expression: "max(officer_pay - cap, 0)"
    inputs:
      officer_pay: { ref: "input.military.officer_combat_pay" }
      cap: { ref: "fed.2024.military.officer_cap" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.adjustments.military_moving"
    description: "Active-duty PCS moving expenses (Form 3903; military moves remain deductible post-TCJA per IRC 217(g))"
    form_line: "Schedule 1 Line 14"
    type: "formula"
    expression: "amount"
    inputs:
      amount: { ref: "input.military.moving_expenses" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.adjustments.reservist_travel"
    description: "Reservist overnight travel more than 100 miles from home (above-the-line, IRC 62(a)(2)(E))"
    form_line: "Schedule 1 Line 12"
    type: "formula"
    expression: "amount"
    inputs:
      amount: { ref: "input.military.reservist_travel" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.adjustments.total"
    description: "Total above-the-line adjustments"
    form_line: "Schedule 1 Line 26"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.adjustments.student_loan" }
        - { ref: "fed.2024.adjustments.educator" }
        - { ref: "fed.2024.adjustments.hsa" }
        - { ref: "fed.2024.adjustments.ira" }
        - { ref: "fed.2024.adjustments.se_tax" }
        - { ref: "fed.2024.adjustments.military_moving" }
        - { ref: "fed.2024.adjustments.reservist_travel" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.agi.total"
    description: "Adjusted gross income (gross income minus adjustments)"
    form_line: "1040 Line 11"
    type: "formula"
    expression: "max(gross - adj, zero)"
    inputs:
      gross: { ref: "fed.2024.gross_income.total" }
      adj: { ref: "fed.2024.adjustments.total" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.standard_deduction"
    description: "Standard deduction for 2024"
    form_line: "1040 Line 13"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.deductions.additional_rate"
    description: "Additional standard deduction per age-65+/blind condition (IRC 63(f), Rev. Proc. amounts for 2024: $1950 unmarried, $1550 married)"
    form_line: "1040 Standard Deduction Chart"
    type: "lookup"
    table: "constants.additional_standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.deductions.additional_standard"
    description: "Additional standard deduction: rate times the number of checked age-65+/blind boxes (up to 4 on a joint return)"
    form_line: "1040 Standard Deduction Chart"
    type: "formula"
    expression: "rate * boxes"
    inputs:
      rate: { ref: "fed.2024.deductions.additional_rate" }
      boxes: { ref: "input.age_blind.boxes" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.deductions.standard_total"
    description: "Standard deduction including age-65+/blind additions"
    form_line: "Standard Deduction Worksheet"
    type: "formula"
    expression: "base + additional"
    inputs:
      base: { ref: "fed.2024.standard_deduction" }
      additional: { ref: "fed.2024.deductions.additional_standard" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.itemized.salt_cap"
    description: "SALT deduction cap by filing status"
    form_line: "Schedule A"
    type: "lookup"
    table: "constants.itemized_limits.salt_cap"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.itemized.salt_total"
    description: "State/local taxes + property taxes, capped at SALT limit"
    form_line: "Schedule A Line 7"
    type: "formula"
    expression: "min(state_taxes + property_taxes, cap)"
    inputs:
      state_taxes: { ref: "input.itemized.state_local_taxes" }
      property_taxes: { ref: "input.itemized.real_estate_taxes" }
      cap: { ref: "fed.2024.itemized.salt_cap" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.itemized.medical_floor"
    description: "7.5% of AGI floor for medical deduction"
    form_line: "Schedule A Line 3"
    type: "formula"
    expression: "agi * rate"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      rate: { literal: "0.075" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.itemized.medical"
    description: "Medical deduction (expenses above 7.5% AGI floor)"
    form_line: "Schedule A Line 4"
    type: "formula"
    expression: "max(expenses - floor, zero)"
    inputs:
      expenses: { ref: "input.itemized.medical_expenses" }
      floor: { ref: "fed.2024.itemized.medical_floor" }
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.itemized.mortgage_interest"
    description: "Home mortgage interest deduction"
    form_line: "Schedule A Line 10"
    type: "formula"
    expression: "input"
    inputs:
      input: { ref: "input.itemized.mortgage_interest" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.itemized.charitable_agi_cap"
    description: "60% of AGI cap for cash charitable contributions"
    form_line: "Schedule A"
    type: "formula"
    expression: "agi * rate"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      rate: { literal: "0.60" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.itemized.charitable_noncash_agi_cap"
    description: "30% of AGI cap for noncash charitable contributions"
    form_line: "Schedule A"
    type: "formula"
    expression: "agi * rate"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      rate: { literal: "0.30" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.itemized.charitable"
    description: "Charitable contributions: cash capped at 60% of AGI, noncash at 30%, combined at 60% (Pub 526 ordering rules between categories are simplified)"
    form_line: "Schedule A Line 14"
    type: "formula"
    expression: "min(min(cash, agi_cap) + min(noncash, noncash_cap), agi_cap)"
    inputs:
      cash: { ref: "input.itemized.charitable_cash" }
      noncash: { ref: "input.itemized.charitable_noncash" }
      agi_cap: { ref: "fed.2024.itemized.charitable_agi_cap" }
      noncash_cap: { ref: "fed.2024.itemized.charitable_noncash_agi_cap" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.itemized.total"
    description: "Total itemized deductions (Schedule A Line 17)"
    form_line: "Schedule A Line 17"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.itemized.medical" }
        - { ref: "fed.2024.itemized.salt_total" }
        - { ref: "fed.2024.itemized.mortgage_interest" }
        - { ref: "fed.2024.itemized.charitable" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.deductions.applied"
    description: "Greater of standard or itemized deduction"
    form_line: "1040 Line 12"
    type: "formula"
    expression: "max(standard, itemized)"
    inputs:
      standard: { ref: "fed.2024.deductions.standard_total" }
      itemized: { ref: "fed.2024.itemized.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.taxable_income"
    description: "Taxable income = max(AGI - applied deduction, 0)"
    form_line: "1040 Line 15"
    type: "formula"
    expression: "max(agi - deduction, 0)"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      deduction: { ref: "fed.2024.deductions.applied" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.tax.brackets"
    description: "Tax on all taxable income at ordinary rates (QDCGT Worksheet comparison figure)"
    form_line: "QDCGT Worksheet Line 24"
    type: "bracket_table"
    input: { ref: "fed.2024.taxable_income" }
