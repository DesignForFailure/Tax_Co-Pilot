  - id: "fed.2024.income.long_term_gains"
    description: "Net long-term capital gain or loss (1099-B long-term lots)"
    form_line: "Schedule D Line 15"
    type: "sum"
    inputs:
      items: { ref: "input.1099b.long_term_gain" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.income.short_term_gains"
    description: "Net short-term capital gain or loss (1099-B short-term lots)"
    form_line: "Schedule D Line 7"
    type: "sum"
    inputs:
      items: { ref: "input.1099b.short_term_gain" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.income.net_capital_gain"
    description: "Net capital gain eligible for preferential rates (smaller of Schedule D lines 15 and 16, not below zero)"
    form_line: "Schedule D Line 16"
    type: "formula"
    expression: "max(min(lt, lt + st), 0)"
    inputs:
      lt: { ref: "fed.2024.income.long_term_gains" }
      st: { ref: "fed.2024.income.short_term_gains" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.income.preferential"
    description: "Preferential-rate income: qualified dividends + net capital gain, capped at taxable income"
    form_line: "QDCGT Worksheet Line 6"
    type: "formula"
    expression: "min(qualified + net_gain, taxable)"
    inputs:
      qualified: { ref: "input.1099div.qualified" }
      net_gain: { ref: "fed.2024.income.net_capital_gain" }
      taxable: { ref: "fed.2024.taxable_income" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.income.ordinary"
    description: "Taxable income taxed at ordinary rates (taxable income minus preferential income)"
    form_line: "QDCGT Worksheet Line 7"
    type: "formula"
    expression: "taxable - preferential"
    inputs:
      taxable: { ref: "fed.2024.taxable_income" }
      preferential: { ref: "fed.2024.income.preferential" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.ltcg.threshold_0"
    description: "Top of the 0% long-term capital gains bracket by filing status"
    form_line: "QDCGT Worksheet Line 9"
    type: "lookup"
    table: "constants.ltcg_threshold_0"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.ltcg.threshold_15"
    description: "Top of the 15% long-term capital gains bracket by filing status"
    form_line: "QDCGT Worksheet Line 15"
    type: "lookup"
    table: "constants.ltcg_threshold_15"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.tax.ordinary"
    description: "Ordinary-rate tax on non-preferential income using 2024 bracket tables"
    form_line: "QDCGT Worksheet Line 22"
    type: "bracket_table"
    input: { ref: "fed.2024.income.ordinary" }
    key: { ref: "input.filing_status" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
    tables:
      single:
        - { lower: "0", upper: "11600", rate: "0.10" }
        - { lower: "11600", upper: "47150", rate: "0.12" }
        - { lower: "47150", upper: "100525", rate: "0.22" }
        - { lower: "100525", upper: "191950", rate: "0.24" }
        - { lower: "191950", upper: "243725", rate: "0.32" }
        - { lower: "243725", upper: "609350", rate: "0.35" }
        - { lower: "609350", upper: null, rate: "0.37" }
      mfj:
        - { lower: "0", upper: "23200", rate: "0.10" }
        - { lower: "23200", upper: "94300", rate: "0.12" }
        - { lower: "94300", upper: "201050", rate: "0.22" }
        - { lower: "201050", upper: "383900", rate: "0.24" }
        - { lower: "383900", upper: "487450", rate: "0.32" }
        - { lower: "487450", upper: "731200", rate: "0.35" }
        - { lower: "731200", upper: null, rate: "0.37" }
      mfs:
        - { lower: "0", upper: "11600", rate: "0.10" }
        - { lower: "11600", upper: "47150", rate: "0.12" }
        - { lower: "47150", upper: "100525", rate: "0.22" }
        - { lower: "100525", upper: "191950", rate: "0.24" }
        - { lower: "191950", upper: "243725", rate: "0.32" }
        - { lower: "243725", upper: "365600", rate: "0.35" }
        - { lower: "365600", upper: null, rate: "0.37" }
      hoh:
        - { lower: "0", upper: "16550", rate: "0.10" }
        - { lower: "16550", upper: "63100", rate: "0.12" }
        - { lower: "63100", upper: "100500", rate: "0.22" }
        - { lower: "100500", upper: "191950", rate: "0.24" }
        - { lower: "191950", upper: "243700", rate: "0.32" }
        - { lower: "243700", upper: "609350", rate: "0.35" }
        - { lower: "609350", upper: null, rate: "0.37" }
      qss:
        - { lower: "0", upper: "23200", rate: "0.10" }
        - { lower: "23200", upper: "94300", rate: "0.12" }
        - { lower: "94300", upper: "201050", rate: "0.22" }
        - { lower: "201050", upper: "383900", rate: "0.24" }
        - { lower: "383900", upper: "487450", rate: "0.32" }
        - { lower: "487450", upper: "731200", rate: "0.35" }
        - { lower: "731200", upper: null, rate: "0.37" }

  - id: "fed.2024.tax.ltcg"
    description: "Tax on preferential income at 0%/15%/20% rates, stacked on top of ordinary income"
    form_line: "QDCGT Worksheet Lines 18-21"
    type: "formula"
    expression: "(min(pref, max(t15 - ordinary, 0)) - min(pref, max(t0 - ordinary, 0))) * r15 + (pref - min(pref, max(t15 - ordinary, 0))) * r20"
    inputs:
      pref: { ref: "fed.2024.income.preferential" }
      ordinary: { ref: "fed.2024.income.ordinary" }
      t0: { ref: "fed.2024.ltcg.threshold_0" }
      t15: { ref: "fed.2024.ltcg.threshold_15" }
      r15: { literal: "0.15" }
      r20: { literal: "0.20" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.tax.total_before_credits"
    description: "Tax before credits: smaller of stacked ordinary+LTCG tax or all-ordinary bracket tax (QDCGT Worksheet Line 25)"
    form_line: "1040 Line 16"
    type: "formula"
    expression: "min(ordinary_tax + ltcg_tax, all_ordinary_tax)"
    inputs:
      ordinary_tax: { ref: "fed.2024.tax.ordinary" }
      ltcg_tax: { ref: "fed.2024.tax.ltcg" }
      all_ordinary_tax: { ref: "fed.2024.tax.brackets" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.ctc.base"
    description: "Child tax credit base amount ($2,000 per qualifying child)"
    form_line: "Form 8812 Line 5"
    type: "formula"
    expression: "children * credit"
    inputs:
      children: { ref: "input.qualifying_children" }
      credit: { literal: "2000" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.ctc.threshold"
    description: "CTC phaseout AGI threshold by filing status"
    form_line: "CTC Worksheet"
    type: "lookup"
    table: "constants.ctc_phaseout_threshold"
    key: { ref: "input.filing_status" }

  - id: "fed.2024.credits.ctc.phaseout_units"
    description: "AGI excess over CTC threshold in $1,000 units, rounded up to the next whole unit (Form 8812)"
    form_line: "CTC Worksheet"
    type: "formula"
    expression: "max((agi - threshold) / thousand, zero)"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
      threshold: { ref: "fed.2024.credits.ctc.threshold" }
      thousand: { literal: "1000" }
      zero: { literal: "0" }
    rounding: "ROUND_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.ctc.phaseout"
    description: "CTC phaseout reduction ($50 per $1,000 or fraction thereof of AGI over threshold)"
    form_line: "CTC Worksheet"
    type: "formula"
    expression: "units * fifty"
    inputs:
      units: { ref: "fed.2024.credits.ctc.phaseout_units" }
      fifty: { literal: "50" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.odc.base"
    description: "Credit for other dependents: $500 per dependent who is not a CTC qualifying child (IRC 24(h)(4); never refundable)"
    form_line: "Form 8812 Line 7"
    type: "formula"
    expression: "dependents * credit"
    inputs:
      dependents: { ref: "input.other_dependents" }
      credit: { literal: "500" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.ctc.combined"
    description: "CTC plus ODC after the shared AGI phaseout (Form 8812 Line 12)"
    form_line: "Form 8812 Line 12"
    type: "formula"
    expression: "max(ctc + odc - phaseout, 0)"
    inputs:
      ctc: { ref: "fed.2024.credits.ctc.base" }
      odc: { ref: "fed.2024.credits.odc.base" }
      phaseout: { ref: "fed.2024.credits.ctc.phaseout" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.other_nonrefundable"
    description: "Nonrefundable credits other than CTC/ODC, applied first per the Form 8812 Credit Limit Worksheet"
    form_line: "Form 8812 Credit Limit Worksheet"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.credits.edu.aotc_nonrefundable" }
        - { ref: "fed.2024.credits.edu.llc" }
        - { ref: "fed.2024.credits.care.final" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.ctc.tax_limit"
    description: "Tax available for the CTC/ODC after other nonrefundable credits (Form 8812 Line 13)"
    form_line: "Form 8812 Line 13"
    type: "formula"
    expression: "max(tax - other_credits, 0)"
    inputs:
      tax: { ref: "fed.2024.tax.total_before_credits" }
      other_credits: { ref: "fed.2024.credits.other_nonrefundable" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.ctc.final"
    description: "Nonrefundable CTC plus ODC allowed against tax (Form 8812 Line 14)"
    form_line: "1040 Line 19"
    type: "formula"
    expression: "min(combined, tax_limit)"
    inputs:
      combined: { ref: "fed.2024.credits.ctc.combined" }
      tax_limit: { ref: "fed.2024.credits.ctc.tax_limit" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.actc.unused"
    description: "CTC/ODC not usable against tax (Form 8812 Line 16a)"
    form_line: "Form 8812 Line 16a"
    type: "formula"
    expression: "combined - allowed"
    inputs:
      combined: { ref: "fed.2024.credits.ctc.combined" }
      allowed: { ref: "fed.2024.credits.ctc.final" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.actc.cap"
    description: "Refundable ACTC ceiling for 2024: $1700 per qualifying child (Form 8812 Line 16b; Rev. Proc. amount)"
    form_line: "Form 8812 Line 16b"
    type: "formula"
    expression: "children * cap"
    inputs:
      children: { ref: "input.qualifying_children" }
      cap: { literal: "1700" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.actc.earned_income"
    description: "Form 8812 earned income: the EIC-worksheet figure plus nontaxable combat pay (always included here, unlike the elective EIC treatment)"
    form_line: "Form 8812 Line 18a"
    type: "formula"
    expression: "earned + combat_pay"
    inputs:
      earned: { ref: "fed.2024.credits.eic.earned_income" }
      combat_pay: { ref: "input.military.combat_pay" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "fed.2024.credits.actc.phase_in"
    description: "15% of earned income above $2,500 (Form 8812 Line 19; the 3-or-more-children Social Security tax alternative is unmodeled - no payroll-tax inputs)"
    form_line: "Form 8812 Line 19"
    type: "formula"
    expression: "max((earned - floor) * rate, 0)"
    inputs:
      earned: { ref: "fed.2024.credits.actc.earned_income" }
      floor: { literal: "2500" }
      rate: { literal: "0.15" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.actc.final"
    description: "Additional child tax credit: the unused CTC/ODC, limited to the per-child ceiling and the 15% earned-income phase-in (refundable; reported with payments)"
    form_line: "1040 Line 28"
    type: "formula"
    expression: "min(min(unused, cap), phase_in)"
    inputs:
      unused: { ref: "fed.2024.credits.actc.unused" }
      cap: { ref: "fed.2024.credits.actc.cap" }
      phase_in: { ref: "fed.2024.credits.actc.phase_in" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.total"
    description: "Total nonrefundable credits"
    form_line: "1040 Line 21"
    type: "sum"
    inputs:
      items:
        - { ref: "fed.2024.credits.ctc.final" }
        - { ref: "fed.2024.credits.edu.aotc_nonrefundable" }
        - { ref: "fed.2024.credits.edu.llc" }
        - { ref: "fed.2024.credits.care.final" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.eic.num_children"
    description: "Qualifying children for EIC, capped at 3 (parameters do not grow past three)"
    form_line: "Schedule EIC"
    type: "formula"
    expression: "min(kids, cap)"
    inputs:
      kids: { ref: "input.qualifying_children" }
      cap: { literal: "3" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "fed.2024.credits.eic.earned_income"
    description: "Earned income for EIC: wages plus SE net profit minus the half-SE-tax deduction (Pub 596 Worksheet B)"
    form_line: "EIC Worksheet Line 1"
    type: "formula"
    expression: "max(wages + nec - se_ded, 0)"
    inputs:
      wages: { ref: "fed.2024.gross_income.wages" }
      nec: { ref: "fed.2024.gross_income.self_employment" }
      se_ded: { ref: "fed.2024.se.deduction" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

