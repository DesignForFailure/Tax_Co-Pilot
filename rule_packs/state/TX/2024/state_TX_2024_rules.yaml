constants: {}

rules:
  - id: "tx.2024.agi"
    description: "Texas — no state income tax"
    type: "formula"
    expression: "zero"
    inputs:
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "tx.2024.tax"
    description: "Texas state income tax (none)"
    type: "formula"
    expression: "zero"
    inputs:
      zero: { literal: "0" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "tx.2024.withholding"
    description: "Texas withholding"
    type: "sum"
    inputs:
      items: { ref: "input.withholding.state.TX" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "tx.2024.refund_or_owed"
    description: "Texas refund/owed"
    type: "formula"
    expression: "withholding - tax"
    inputs:
      withholding: { ref: "tx.2024.withholding" }
      tax: { ref: "tx.2024.tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
