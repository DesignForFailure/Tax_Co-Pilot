constants:
  standard_deduction:
    single: "5540"
    mfj: "11080"
    mfs: "5540"
    hoh: "11080"
    qss: "11080"

rules:
  - id: "ca.2024.agi"
    description: "California AGI (MVP: starts from federal AGI)"
    type: "formula"
    expression: "federal_agi"
    inputs:
      federal_agi: { ref: "fed.2024.agi.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ca.2024.standard_deduction"
    description: "California standard deduction"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "ca.2024.taxable_income"
    description: "California taxable income = max(AGI - standard deduction, 0)"
    type: "formula"
    expression: "max(agi - deduction, 0)"
    inputs:
      agi: { ref: "ca.2024.agi" }
      deduction: { ref: "ca.2024.standard_deduction" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.tax.base"
    description: "California income tax using 2024 bracket tables"
    type: "bracket_table"
    input: { ref: "ca.2024.taxable_income" }
    key: { ref: "input.filing_status" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2
    tables:
      single:
        - { lower: "0", upper: "10756", rate: "0.01" }
        - { lower: "10756", upper: "25499", rate: "0.02" }
        - { lower: "25499", upper: "40245", rate: "0.04" }
        - { lower: "40245", upper: "55866", rate: "0.06" }
        - { lower: "55866", upper: "70606", rate: "0.08" }
        - { lower: "70606", upper: "360659", rate: "0.093" }
        - { lower: "360659", upper: "432787", rate: "0.103" }
        - { lower: "432787", upper: "721314", rate: "0.113" }
        - { lower: "721314", upper: null, rate: "0.123" }
      mfj:
        - { lower: "0", upper: "21512", rate: "0.01" }
        - { lower: "21512", upper: "50998", rate: "0.02" }
        - { lower: "50998", upper: "80490", rate: "0.04" }
        - { lower: "80490", upper: "111732", rate: "0.06" }
        - { lower: "111732", upper: "141212", rate: "0.08" }
        - { lower: "141212", upper: "721318", rate: "0.093" }
        - { lower: "721318", upper: "865574", rate: "0.103" }
        - { lower: "865574", upper: "1442628", rate: "0.113" }
        - { lower: "1442628", upper: null, rate: "0.123" }
      mfs:
        - { lower: "0", upper: "10756", rate: "0.01" }
        - { lower: "10756", upper: "25499", rate: "0.02" }
        - { lower: "25499", upper: "40245", rate: "0.04" }
        - { lower: "40245", upper: "55866", rate: "0.06" }
        - { lower: "55866", upper: "70606", rate: "0.08" }
        - { lower: "70606", upper: "360659", rate: "0.093" }
        - { lower: "360659", upper: "432787", rate: "0.103" }
        - { lower: "432787", upper: "721314", rate: "0.113" }
        - { lower: "721314", upper: null, rate: "0.123" }
      # FTB Schedule Z: HoH has its own schedule.
      hoh:
        - { lower: "0", upper: "21527", rate: "0.01" }
        - { lower: "21527", upper: "51000", rate: "0.02" }
        - { lower: "51000", upper: "65744", rate: "0.04" }
        - { lower: "65744", upper: "81364", rate: "0.06" }
        - { lower: "81364", upper: "96107", rate: "0.08" }
        - { lower: "96107", upper: "490493", rate: "0.093" }
        - { lower: "490493", upper: "588593", rate: "0.103" }
        - { lower: "588593", upper: "980987", rate: "0.113" }
        - { lower: "980987", upper: null, rate: "0.123" }
      qss:
        - { lower: "0", upper: "21512", rate: "0.01" }
        - { lower: "21512", upper: "50998", rate: "0.02" }
        - { lower: "50998", upper: "80490", rate: "0.04" }
        - { lower: "80490", upper: "111732", rate: "0.06" }
        - { lower: "111732", upper: "141212", rate: "0.08" }
        - { lower: "141212", upper: "721318", rate: "0.093" }
        - { lower: "721318", upper: "865574", rate: "0.103" }
        - { lower: "865574", upper: "1442628", rate: "0.113" }
        - { lower: "1442628", upper: null, rate: "0.123" }

  - id: "ca.2024.tax.mhs"
    description: "Mental health services surtax (1% on taxable income over $1M)"
    type: "formula"
    expression: "max(taxable_income - threshold, 0) * rate"
    inputs:
      taxable_income: { ref: "ca.2024.taxable_income" }
      threshold: { literal: "1000000" }
      rate: { literal: "0.01" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ca.2024.tax"
    description: "California total income tax"
    type: "formula"
    expression: "base_tax + mhs"
    inputs:
      base_tax: { ref: "ca.2024.tax.base" }
      mhs: { ref: "ca.2024.tax.mhs" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.withholding"
    description: "Total California tax withheld"
    type: "sum"
    inputs:
      items: { ref: "input.withholding.state.CA" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ca.2024.refund_or_owed"
    description: "California refund (positive) or amount owed (negative)"
    type: "formula"
    expression: "withholding - tax"
    inputs:
      withholding: { ref: "ca.2024.withholding" }
      tax: { ref: "ca.2024.tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
