constants:
  standard_deduction:
    single: "5540"
    mfj: "11080"
    mfs: "5540"
    hoh: "11080"
    qss: "11080"

  # FTB nonrefundable renter's credit, TY 2024 (R&TC 17053.5): flat amount
  # by filing status, allowed only when CA AGI is at or under the ceiling.
  renter_credit_amount:
    single: "60"
    mfj: "120"
    mfs: "60"
    hoh: "120"
    qss: "120"
  renter_credit_agi_limit:
    single: "52421"
    mfj: "104842"
    mfs: "52421"
    hoh: "104842"
    qss: "104842"

  # Form 540 lines 7-10 exemption credits for 2024: $149 per personal/
  # blind/senior unit (2 personal units for MFJ and QSS), $461 per
  # dependent. The high-AGI exemption credit phaseout (R&TC 17054.1)
  # is unmodeled.
  exemption_credit_personal:
    single: "149"
    mfj: "298"
    mfs: "149"
    hoh: "149"
    qss: "298"

rules:
  - id: "ca.2024.agi"
    description: "California AGI (MVP: starts from federal AGI)"
    type: "formula"
    expression: "federal_agi"
    inputs:
      federal_agi: { ref: "fed.2024.agi.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ca.2024.standard_deduction"
    description: "California standard deduction"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "ca.2024.taxable_income"
    description: "California taxable income = max(AGI - standard deduction, 0)"
    type: "formula"
    expression: "max(agi - deduction, 0)"
    inputs:
      agi: { ref: "ca.2024.agi" }
      deduction: { ref: "ca.2024.standard_deduction" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.tax.base"
    description: "California income tax using 2024 bracket tables"
    type: "bracket_table"
    input: { ref: "ca.2024.taxable_income" }
    key: { ref: "input.filing_status" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2
    tables:
      single:
        - { lower: "0", upper: "10756", rate: "0.01" }
        - { lower: "10756", upper: "25499", rate: "0.02" }
        - { lower: "25499", upper: "40245", rate: "0.04" }
        - { lower: "40245", upper: "55866", rate: "0.06" }
        - { lower: "55866", upper: "70606", rate: "0.08" }
        - { lower: "70606", upper: "360659", rate: "0.093" }
        - { lower: "360659", upper: "432787", rate: "0.103" }
        - { lower: "432787", upper: "721314", rate: "0.113" }
        - { lower: "721314", upper: null, rate: "0.123" }
      mfj:
        - { lower: "0", upper: "21512", rate: "0.01" }
        - { lower: "21512", upper: "50998", rate: "0.02" }
        - { lower: "50998", upper: "80490", rate: "0.04" }
        - { lower: "80490", upper: "111732", rate: "0.06" }
        - { lower: "111732", upper: "141212", rate: "0.08" }
        - { lower: "141212", upper: "721318", rate: "0.093" }
        - { lower: "721318", upper: "865574", rate: "0.103" }
        - { lower: "865574", upper: "1442628", rate: "0.113" }
        - { lower: "1442628", upper: null, rate: "0.123" }
      mfs:
        - { lower: "0", upper: "10756", rate: "0.01" }
        - { lower: "10756", upper: "25499", rate: "0.02" }
        - { lower: "25499", upper: "40245", rate: "0.04" }
        - { lower: "40245", upper: "55866", rate: "0.06" }
        - { lower: "55866", upper: "70606", rate: "0.08" }
        - { lower: "70606", upper: "360659", rate: "0.093" }
        - { lower: "360659", upper: "432787", rate: "0.103" }
        - { lower: "432787", upper: "721314", rate: "0.113" }
        - { lower: "721314", upper: null, rate: "0.123" }
      # FTB Schedule Z: HoH has its own schedule.
      hoh:
        - { lower: "0", upper: "21527", rate: "0.01" }
        - { lower: "21527", upper: "51000", rate: "0.02" }
        - { lower: "51000", upper: "65744", rate: "0.04" }
        - { lower: "65744", upper: "81364", rate: "0.06" }
        - { lower: "81364", upper: "96107", rate: "0.08" }
        - { lower: "96107", upper: "490493", rate: "0.093" }
        - { lower: "490493", upper: "588593", rate: "0.103" }
        - { lower: "588593", upper: "980987", rate: "0.113" }
        - { lower: "980987", upper: null, rate: "0.123" }
      qss:
        - { lower: "0", upper: "21512", rate: "0.01" }
        - { lower: "21512", upper: "50998", rate: "0.02" }
        - { lower: "50998", upper: "80490", rate: "0.04" }
        - { lower: "80490", upper: "111732", rate: "0.06" }
        - { lower: "111732", upper: "141212", rate: "0.08" }
        - { lower: "141212", upper: "721318", rate: "0.093" }
        - { lower: "721318", upper: "865574", rate: "0.103" }
        - { lower: "865574", upper: "1442628", rate: "0.113" }
        - { lower: "1442628", upper: null, rate: "0.123" }

  - id: "ca.2024.tax.mhs"
    description: "Mental health services surtax (1% on taxable income over $1M)"
    type: "formula"
    expression: "max(taxable_income - threshold, 0) * rate"
    inputs:
      taxable_income: { ref: "ca.2024.taxable_income" }
      threshold: { literal: "1000000" }
      rate: { literal: "0.01" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ca.2024.tax"
    description: "California total income tax"
    type: "formula"
    expression: "base_tax + mhs"
    inputs:
      base_tax: { ref: "ca.2024.tax.base" }
      mhs: { ref: "ca.2024.tax.mhs" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  # CalEITC is deliberately not modeled: the FTB publishes its two-segment
  # phaseout only as Form 3514 worksheet tables, which cannot be verified
  # into a closed-form rule from official sources. Known limitation (M23).
  - id: "ca.2024.credits.renter.amount"
    description: "Renter's credit amount by filing status ($60 single/MFS, $120 MFJ/HoH/QSS)"
    type: "lookup"
    table: "constants.renter_credit_amount"
    key: { ref: "input.filing_status" }

  - id: "ca.2024.credits.renter.agi_limit"
    description: "Renter's credit CA AGI ceiling for 2024 ($52,421 single/MFS, $104,842 MFJ/HoH/QSS)"
    type: "lookup"
    table: "constants.renter_credit_agi_limit"
    key: { ref: "input.filing_status" }

  - id: "ca.2024.credits.renter"
    description: "Nonrefundable renter's credit: flat amount when the filer paid rent on a principal CA residence at least half the year and CA AGI is at or under the ceiling; capped at tax"
    form_line: "CA Form 540 Line 46"
    type: "formula"
    expression: "min(amount, tax) * renter * min(max((limit - agi) * 1000 + 1, 0), 1)"
    inputs:
      amount: { ref: "ca.2024.credits.renter.amount" }
      tax: { ref: "ca.2024.tax" }
      renter: { ref: "input.state.ca_renter" }
      limit: { ref: "ca.2024.credits.renter.agi_limit" }
      agi: { ref: "ca.2024.agi" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.credits.exemption.personal"
    description: "Personal exemption credit ($149 per Form 540 line 7 unit; 2 units for MFJ/QSS)"
    type: "lookup"
    table: "constants.exemption_credit_personal"
    key: { ref: "input.filing_status" }

  - id: "ca.2024.credits.exemption.blind"
    description: "Blind exemption credit: $149 per visually impaired taxpayer (Form 540 line 8)"
    type: "formula"
    expression: "amount * blind"
    inputs:
      amount: { literal: "149" }
      blind: { ref: "input.age_blind.blind" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.credits.exemption.senior"
    description: "Senior exemption credit: $149 per taxpayer 65 or older (Form 540 line 9)"
    type: "formula"
    expression: "amount * seniors"
    inputs:
      amount: { literal: "149" }
      seniors: { ref: "input.age_blind.seniors" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.credits.exemption.dependent"
    description: "Dependent exemption credit: $461 per dependent (Form 540 line 10)"
    type: "formula"
    expression: "amount * dependents"
    inputs:
      amount: { literal: "461" }
      dependents: { ref: "input.dependents.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.credits.exemptions"
    description: "Total Form 540 exemption credits (line 11; high-AGI phaseout unmodeled)"
    type: "sum"
    inputs:
      items:
        - { ref: "ca.2024.credits.exemption.personal" }
        - { ref: "ca.2024.credits.exemption.blind" }
        - { ref: "ca.2024.credits.exemption.senior" }
        - { ref: "ca.2024.credits.exemption.dependent" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.credits.total"
    description: "Total California nonrefundable credits (exemption credits + renter's credit), capped at tax"
    type: "formula"
    expression: "min(renter + exemptions, tax)"
    inputs:
      renter: { ref: "ca.2024.credits.renter" }
      exemptions: { ref: "ca.2024.credits.exemptions" }
      tax: { ref: "ca.2024.tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ca.2024.withholding"
    description: "Total California tax withheld"
    type: "sum"
    inputs:
      items: { ref: "input.withholding.state.CA" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ca.2024.refund_or_owed"
    description: "California refund (positive) or amount owed (negative), after nonrefundable credits"
    type: "formula"
    expression: "withholding - tax + credits"
    inputs:
      withholding: { ref: "ca.2024.withholding" }
      tax: { ref: "ca.2024.tax" }
      credits: { ref: "ca.2024.credits.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
