# Source authority (TY 2024):
#   - GA SB 56 (2023): standard deduction $24,000 MFJ / $12,000 all other
#     statuses effective TY 2024; personal exemptions for self/spouse
#     repealed (2024 IT-511 "What's New").
#   - GA HB 1015 (2024): flat rate accelerated to 5.39% retroactive to
#     1/1/2024.
#   - GA HB 1021 (2024): dependent exemption raised to $4,000 (not modeled
#     here; consistent with the 2025 pack).
constants:
  standard_deduction:
    single: "12000"
    mfj: "24000"
    mfs: "12000"
    hoh: "12000"
    qss: "12000"

  low_income_filer_exemptions:
    single: "1"
    mfj: "2"
    mfs: "1"
    hoh: "1"
    qss: "1"

rules:
  - id: "ga.2024.agi"
    description: "Georgia AGI (MVP: starts from federal AGI)"
    type: "formula"
    expression: "federal_agi"
    inputs:
      federal_agi: { ref: "fed.2024.agi.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ga.2024.standard_deduction"
    description: "Georgia standard deduction"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "ga.2024.taxable_income"
    description: "Georgia taxable income = max(AGI - standard deduction, 0); personal exemptions repealed by SB 56 effective TY 2024"
    type: "formula"
    expression: "max(agi - deduction, 0)"
    inputs:
      agi: { ref: "ga.2024.agi" }
      deduction: { ref: "ga.2024.standard_deduction" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2024.tax"
    description: "Georgia income tax (2024 flat rate 5.39%)"
    type: "formula"
    expression: "taxable_income * rate"
    inputs:
      taxable_income: { ref: "ga.2024.taxable_income" }
      rate: { literal: "0.0539" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2024.credits.low_income.filers"
    description: "Low income credit filer exemptions (self, plus spouse for MFJ)"
    type: "lookup"
    table: "constants.low_income_filer_exemptions"
    key: { ref: "input.filing_status" }

  - id: "ga.2024.credits.low_income.per_exemption"
    description: "Low income credit per exemption, keyed by federal AGI (O.C.G.A. 48-7A-3 schedule: under $6,000 $26; $6,000-$7,999 $20; $8,000-$9,999 $14; $10,000-$14,999 $8; $15,000-$19,999 $5; $20,000+ ineligible)"
    type: "formula"
    expression: "26 - 6 * min(max((agi - 6000) * 1000 + 1, 0), 1) - 6 * min(max((agi - 8000) * 1000 + 1, 0), 1) - 6 * min(max((agi - 10000) * 1000 + 1, 0), 1) - 3 * min(max((agi - 15000) * 1000 + 1, 0), 1) - 5 * min(max((agi - 20000) * 1000 + 1, 0), 1)"
    inputs:
      agi: { ref: "fed.2024.agi.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2024.credits.low_income.exemptions"
    description: "Low income credit exemption count: filers plus dependents (approximated by CTC qualifying children) plus one extra per taxpayer 65 or older (IT-511 worksheet line 3)"
    type: "formula"
    expression: "filers + children + seniors"
    inputs:
      filers: { ref: "ga.2024.credits.low_income.filers" }
      children: { ref: "input.qualifying_children" }
      seniors: { ref: "input.age_blind.seniors" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2024.credits.low_income"
    description: "Georgia low income credit, nonrefundable and capped at tax (claimed-as-dependent and inmate exclusions are unmodeled)"
    form_line: "GA Form 500 Schedule 2"
    type: "formula"
    expression: "min(per_exemption * exemptions, tax)"
    inputs:
      per_exemption: { ref: "ga.2024.credits.low_income.per_exemption" }
      exemptions: { ref: "ga.2024.credits.low_income.exemptions" }
      tax: { ref: "ga.2024.tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2024.credits.total"
    description: "Total Georgia nonrefundable credits"
    type: "sum"
    inputs:
      items:
        - { ref: "ga.2024.credits.low_income" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2024.withholding"
    description: "Total Georgia tax withheld"
    type: "sum"
    inputs:
      items: { ref: "input.withholding.state.GA" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ga.2024.refund_or_owed"
    description: "Georgia refund (positive) or amount owed (negative), after nonrefundable credits"
    type: "formula"
    expression: "withholding - tax + credits"
    inputs:
      withholding: { ref: "ga.2024.withholding" }
      tax: { ref: "ga.2024.tax" }
      credits: { ref: "ga.2024.credits.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
