constants:
  standard_deduction:
    single: "5400"
    mfj: "7100"
    mfs: "3550"
    hoh: "5400"
    qss: "7100"
  personal_exemption:
    single: "2700"
    mfj: "7400"
    mfs: "3700"
    hoh: "2700"
    qss: "7400"

  low_income_filer_exemptions:
    single: "1"
    mfj: "2"
    mfs: "1"
    hoh: "1"
    qss: "1"

rules:
  - id: "ga.2023.agi"
    description: "Georgia AGI (starts from federal AGI)"
    type: "formula"
    expression: "federal_agi"
    inputs:
      federal_agi: { ref: "fed.2023.agi.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ga.2023.standard_deduction"
    description: "Georgia standard deduction"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "ga.2023.personal_exemption"
    description: "Georgia personal exemption"
    type: "lookup"
    table: "constants.personal_exemption"
    key: { ref: "input.filing_status" }

  - id: "ga.2023.dependent_exemption"
    description: "Georgia dependent exemption: $3000 per dependent (O.C.G.A. 48-7-26)"
    type: "formula"
    expression: "amount * dependents"
    inputs:
      amount: { literal: "3000" }
      dependents: { ref: "input.dependents.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2023.taxable_income"
    description: "Georgia taxable income = max(AGI - standard deduction - personal exemption - dependent exemption, 0)"
    type: "formula"
    expression: "max(agi - deduction - exemption - dep_exemption, 0)"
    inputs:
      agi: { ref: "ga.2023.agi" }
      deduction: { ref: "ga.2023.standard_deduction" }
      exemption: { ref: "ga.2023.personal_exemption" }
      dep_exemption: { ref: "ga.2023.dependent_exemption" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2023.tax"
    description: "Georgia income tax (2023 graduated brackets, top rate 5.75%)"
    type: "bracket_table"
    input: { ref: "ga.2023.taxable_income" }
    key: { ref: "input.filing_status" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
    tables:
      single:
        - { lower: "0", upper: "750", rate: "0.01" }
        - { lower: "750", upper: "2250", rate: "0.02" }
        - { lower: "2250", upper: "3750", rate: "0.03" }
        - { lower: "3750", upper: "5250", rate: "0.04" }
        - { lower: "5250", upper: "7000", rate: "0.05" }
        - { lower: "7000", upper: null, rate: "0.0575" }
      mfj:
        - { lower: "0", upper: "1000", rate: "0.01" }
        - { lower: "1000", upper: "3000", rate: "0.02" }
        - { lower: "3000", upper: "5000", rate: "0.03" }
        - { lower: "5000", upper: "7000", rate: "0.04" }
        - { lower: "7000", upper: "10000", rate: "0.05" }
        - { lower: "10000", upper: null, rate: "0.0575" }
      mfs:
        - { lower: "0", upper: "500", rate: "0.01" }
        - { lower: "500", upper: "1500", rate: "0.02" }
        - { lower: "1500", upper: "2500", rate: "0.03" }
        - { lower: "2500", upper: "3500", rate: "0.04" }
        - { lower: "3500", upper: "5000", rate: "0.05" }
        - { lower: "5000", upper: null, rate: "0.0575" }
      # Pre-2024 O.C.G.A. 48-7-20(b): HoH uses the MFJ schedule.
      hoh:
        - { lower: "0", upper: "1000", rate: "0.01" }
        - { lower: "1000", upper: "3000", rate: "0.02" }
        - { lower: "3000", upper: "5000", rate: "0.03" }
        - { lower: "5000", upper: "7000", rate: "0.04" }
        - { lower: "7000", upper: "10000", rate: "0.05" }
        - { lower: "10000", upper: null, rate: "0.0575" }
      qss:
        - { lower: "0", upper: "1000", rate: "0.01" }
        - { lower: "1000", upper: "3000", rate: "0.02" }
        - { lower: "3000", upper: "5000", rate: "0.03" }
        - { lower: "5000", upper: "7000", rate: "0.04" }
        - { lower: "7000", upper: "10000", rate: "0.05" }
        - { lower: "10000", upper: null, rate: "0.0575" }

  - id: "ga.2023.credits.low_income.filers"
    description: "Low income credit filer exemptions (self, plus spouse for MFJ)"
    type: "lookup"
    table: "constants.low_income_filer_exemptions"
    key: { ref: "input.filing_status" }

  - id: "ga.2023.credits.low_income.per_exemption"
    description: "Low income credit per exemption, keyed by federal AGI (O.C.G.A. 48-7A-3 schedule: under $6,000 $26; $6,000-$7,999 $20; $8,000-$9,999 $14; $10,000-$14,999 $8; $15,000-$19,999 $5; $20,000+ ineligible)"
    type: "formula"
    expression: "26 - 6 * min(max((agi - 6000) * 1000 + 1, 0), 1) - 6 * min(max((agi - 8000) * 1000 + 1, 0), 1) - 6 * min(max((agi - 10000) * 1000 + 1, 0), 1) - 3 * min(max((agi - 15000) * 1000 + 1, 0), 1) - 5 * min(max((agi - 20000) * 1000 + 1, 0), 1)"
    inputs:
      agi: { ref: "fed.2023.agi.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2023.credits.low_income.exemptions"
    description: "Low income credit exemption count: filers plus dependents (approximated by CTC qualifying children) plus one extra per taxpayer 65 or older (IT-511 worksheet line 3)"
    type: "formula"
    expression: "filers + children + seniors"
    inputs:
      filers: { ref: "ga.2023.credits.low_income.filers" }
      children: { ref: "input.qualifying_children" }
      seniors: { ref: "input.age_blind.seniors" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2023.credits.low_income"
    description: "Georgia low income credit, nonrefundable and capped at tax (claimed-as-dependent and inmate exclusions are unmodeled)"
    form_line: "GA Form 500 Schedule 2"
    type: "formula"
    expression: "min(per_exemption * exemptions, tax)"
    inputs:
      per_exemption: { ref: "ga.2023.credits.low_income.per_exemption" }
      exemptions: { ref: "ga.2023.credits.low_income.exemptions" }
      tax: { ref: "ga.2023.tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2023.credits.total"
    description: "Total Georgia nonrefundable credits"
    type: "sum"
    inputs:
      items:
        - { ref: "ga.2023.credits.low_income" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2023.withholding"
    description: "Total Georgia tax withheld"
    type: "sum"
    inputs:
      items: { ref: "input.withholding.state.GA" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ga.2023.refund_or_owed"
    description: "Georgia refund (positive) or amount owed (negative), after nonrefundable credits"
    type: "formula"
    expression: "withholding - tax + credits"
    inputs:
      withholding: { ref: "ga.2023.withholding" }
      tax: { ref: "ga.2023.tax" }
      credits: { ref: "ga.2023.credits.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
