# =============================================================================
# Source authority:
#   - Georgia Department of Revenue, dor.georgia.gov
#     * Flat rate: 5.19% for TY 2025
#     * Standard deduction: $12,000 (S/HOH/MFS/QSS), $24,000 (MFJ)
#   - Georgia SB 56 (2023): Eliminated personal exemptions for self/spouse,
#     replaced with increased standard deduction. Dependent exemption $4,000
#     per HB 1021 (2024).
#   - Georgia HB 1437 (2022) started the flat-tax glide path; HB 1015 (2024)
#     accelerated 2024 to 5.39%, and HB 111 (2025) set the 2025 rate at 5.19%.
#   - GA DOR Important Tax Updates page (verified Feb 2026):
#     "The Georgia income tax rate remains at a flat rate of 5.19%"
#
# NOTE: Georgia has NOT adopted OBBBA federal changes as of this writing.
#       GA AGI starts from federal AGI (pre-OBBBA conformity date).
#       Monitor dor.georgia.gov for conformity updates.
#
# NOTE: Dependent exemption ($4,000/dependent) is modeled since pack
#       v1.4.0 (M28).
# =============================================================================

constants:
  # Source: GA DOR "Standard Deductions Increases" page + Form 500-ES (2025)
  # Personal exemptions for self/spouse eliminated per SB 56 (eff. TY 2024)
  standard_deduction:
    single: "12000"
    mfj: "24000"
    mfs: "12000"
    hoh: "12000"
    qss: "12000"

  low_income_filer_exemptions:
    single: "1"
    mfj: "2"
    mfs: "1"
    hoh: "1"
    qss: "1"

rules:
  - id: "ga.2025.agi"
    description: "Georgia AGI (MVP: starts from federal AGI)"
    type: "formula"
    expression: "federal_agi"
    inputs:
      federal_agi: { ref: "fed.2025.agi.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ga.2025.standard_deduction"
    description: "Georgia standard deduction"
    type: "lookup"
    table: "constants.standard_deduction"
    key: { ref: "input.filing_status" }

  - id: "ga.2025.dependent_exemption"
    description: "Georgia dependent exemption: $4000 per dependent (O.C.G.A. 48-7-26; HB 1021 raised from $3,000 effective TY 2024)"
    type: "formula"
    expression: "amount * dependents"
    inputs:
      amount: { literal: "4000" }
      dependents: { ref: "input.dependents.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.taxable_income"
    description: "Georgia taxable income = max(AGI - standard deduction - dependent exemption, 0); personal exemptions for self/spouse repealed by SB 56"
    type: "formula"
    expression: "max(agi - deduction - dep_exemption, 0)"
    inputs:
      agi: { ref: "ga.2025.agi" }
      deduction: { ref: "ga.2025.standard_deduction" }
      dep_exemption: { ref: "ga.2025.dependent_exemption" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.tax.full"
    description: "Georgia income tax (2025 flat rate 5.19%) before apportionment"
    type: "formula"
    expression: "taxable_income * rate"
    inputs:
      taxable_income: { ref: "ga.2025.taxable_income" }
      rate: { literal: "0.0519" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.tax"
    description: "GA tax after nonresident wage apportionment (ratio 1 for residents; nonresidents pay the as-if-resident tax times the GA-wage share, the standard ratio method)"
    type: "formula"
    expression: "full * ratio"
    inputs:
      full: { ref: "ga.2025.tax.full" }
      ratio: { ref: "input.state.apportionment.GA" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.credits.other_state"
    description: "Resident credit for taxes paid to other states: the smaller of their net tax or this state's tax on the doubly-taxed wage share (zero for nonresidents; nonresident credits are not prorated - documented simplification)"
    type: "formula"
    expression: "min(other_tax, full * dbl_ratio) * is_resident"
    inputs:
      other_tax: { ref: "input.state.other_state_tax" }
      full: { ref: "ga.2025.tax.full" }
      dbl_ratio: { ref: "input.state.other_state_ratio" }
      is_resident: { ref: "input.state.is_resident.GA" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.credits.low_income.filers"
    description: "Low income credit filer exemptions (self, plus spouse for MFJ)"
    type: "lookup"
    table: "constants.low_income_filer_exemptions"
    key: { ref: "input.filing_status" }

  - id: "ga.2025.credits.low_income.per_exemption"
    description: "Low income credit per exemption, keyed by federal AGI (O.C.G.A. 48-7A-3 schedule: under $6,000 $26; $6,000-$7,999 $20; $8,000-$9,999 $14; $10,000-$14,999 $8; $15,000-$19,999 $5; $20,000+ ineligible)"
    type: "formula"
    expression: "26 - 6 * min(max((agi - 6000) * 1000 + 1, 0), 1) - 6 * min(max((agi - 8000) * 1000 + 1, 0), 1) - 6 * min(max((agi - 10000) * 1000 + 1, 0), 1) - 3 * min(max((agi - 15000) * 1000 + 1, 0), 1) - 5 * min(max((agi - 20000) * 1000 + 1, 0), 1)"
    inputs:
      agi: { ref: "fed.2025.agi.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.credits.low_income.exemptions"
    description: "Low income credit exemption count: filers plus dependents (approximated by CTC qualifying children) plus one extra per taxpayer 65 or older (IT-511 worksheet line 3)"
    type: "formula"
    expression: "filers + children + seniors"
    inputs:
      filers: { ref: "ga.2025.credits.low_income.filers" }
      children: { ref: "input.qualifying_children" }
      seniors: { ref: "input.age_blind.seniors" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.credits.low_income"
    description: "Georgia low income credit, nonrefundable and capped at tax (claimed-as-dependent and inmate exclusions are unmodeled)"
    form_line: "GA Form 500 Schedule 2"
    type: "formula"
    expression: "min(per_exemption * exemptions, tax)"
    inputs:
      per_exemption: { ref: "ga.2025.credits.low_income.per_exemption" }
      exemptions: { ref: "ga.2025.credits.low_income.exemptions" }
      tax: { ref: "ga.2025.tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.credits.total"
    description: "Total Georgia nonrefundable credits (low income + other-state credit), capped at tax"
    type: "formula"
    expression: "min(low_income + other_state, tax)"
    inputs:
      low_income: { ref: "ga.2025.credits.low_income" }
      other_state: { ref: "ga.2025.credits.other_state" }
      tax: { ref: "ga.2025.tax" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0

  - id: "ga.2025.withholding"
    description: "Total Georgia tax withheld"
    type: "sum"
    inputs:
      items: { ref: "input.withholding.state.GA" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 2

  - id: "ga.2025.refund_or_owed"
    description: "Georgia refund (positive) or amount owed (negative), after nonrefundable credits"
    type: "formula"
    expression: "withholding - tax + credits"
    inputs:
      withholding: { ref: "ga.2025.withholding" }
      tax: { ref: "ga.2025.tax" }
      credits: { ref: "ga.2025.credits.total" }
    rounding: "ROUND_HALF_UP"
    rounding_precision: 0
