<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Copilot — {% block title %}Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242834;
            --border: #2e3345;
            --text: #e4e6f0;
            --text-dim: #8b8fa3;
            --accent: #6c8cff;
            --accent-dim: #4a65c0;
            --green: #4ade80;
            --red: #f87171;
            --orange: #fbbf24;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        /* Nav */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
            position: sticky; top: 0; z-index: 100;
        }
        nav .container { display: flex; align-items: center; gap: 32px; }
        nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 14px; transition: color 0.15s; }
        nav a:hover { color: var(--text); }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
        .card h3 { font-size: 15px; margin-bottom: 12px; color: var(--text-dim); }

        /* Summary grid */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .summary-item {
            background: var(--surface2);
            border-radius: 10px;
            padding: 18px;
        }
        .summary-item .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-item .value { font-size: 28px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
        .summary-item .value.positive { color: var(--green); }
        .summary-item .value.negative { color: var(--red); }

        /* Forms */
        label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
        input, select {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 14px;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

        button, .btn {
            display: inline-block;
            padding: 10px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }
        button:hover, .btn:hover { background: var(--accent-dim); }
        .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
        .btn-secondary:hover { background: var(--border); }

        /* Trace / Explain */
        .trace-list { list-style: none; }
        .trace-item {
            background: var(--surface2);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent);
        }
        .trace-item .rule-id { font-size: 12px; color: var(--accent); font-family: monospace; }
        .trace-item .desc { font-size: 14px; margin: 6px 0; }
        .trace-item .explanation { font-size: 13px; color: var(--text-dim); }
        .trace-item .result-val { font-size: 20px; font-weight: 700; margin-top: 8px; }

        .intermediates {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-dim);
            font-family: monospace;
            background: var(--bg);
            padding: 10px;
            border-radius: 6px;
        }

        /* Misc */
        .mt-4 { margin-top: 16px; }
        .mt-6 { margin-top: 24px; }
        .mb-4 { margin-bottom: 16px; }
        .text-dim { color: var(--text-dim); }
        .text-sm { font-size: 13px; }
        .flex { display: flex; }
        .gap-3 { gap: 12px; }
        .disclaimer {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <span class="logo">⚡ Tax Copilot</span>
            <a href="/">Dashboard</a>
            <a href="/calculate">Calculate</a>
            <a href="/runs">Past Runs</a>
        </div>
    </nav>

    <main class="container" style="padding-top: 32px; padding-bottom: 64px;">
        {% block content %}{% endblock %}
    </main>

    <div class="container">
        <div class="disclaimer">
            <strong>Disclaimer:</strong> Tax Copilot is a computational tool, not a tax advisor.
            All calculations should be verified by a qualified tax professional before filing.
            This software does not provide tax, legal, or financial advice.
        </div>
    </div>
</body>
</html>
